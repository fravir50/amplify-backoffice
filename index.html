<style>
:root {
  --bg-base: #0C0C0C;
  --bg-sidebar: #111111;
  --bg-card: #1A1A1A;
  --bg-card-hover: #212121;
  --bg-input: #242424;
  --border: #2C2C2C;
  --border-focus: #E8622C;
  --accent: #E8622C;
  --accent-hover: #D4561F;
  --accent-light: rgba(232,98,44,0.12);
  --text-primary: #F5F5F5;
  --text-secondary: #A0A0A0;
  --text-muted: #5A5A5A;
  --green: #22C55E;
  --red: #EF4444;
  --yellow: #F59E0B;
  --shadow-card: none;
  --shadow-panel: none;
  --badge-gray-bg: rgba(160,160,160,.13);
  --badge-gray-color: #A0A0A0;
}

/* ── LIGHT MODE ──────────────────────────────────────────── */
[data-theme="light"] {
  --bg-base: #F1F1F3;
  --bg-sidebar: #FFFFFF;
  --bg-card: #FFFFFF;
  --bg-card-hover: #F7F7F8;
  --bg-input: #F1F1F3;
  --border: #E2E2E6;
  --border-focus: #E8622C;
  --accent: #E8622C;
  --accent-hover: #D4561F;
  --accent-light: rgba(232,98,44,0.10);
  --text-primary: #0A0A0B;
  --text-secondary: #50505A;
  --text-muted: #9898A8;
  --green: #15803D;
  --red: #B91C1C;
  --yellow: #B45309;
  --shadow-card: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
  --shadow-panel: -6px 0 24px rgba(0,0,0,.10);
  --badge-gray-bg: rgba(0,0,0,.07);
  --badge-gray-color: #50505A;
}
[data-theme="light"] .card { box-shadow: var(--shadow-card); }
[data-theme="light"] .table-wrap { box-shadow: 0 1px 3px rgba(0,0,0,.05); }
[data-theme="light"] .sidebar { box-shadow: 1px 0 0 var(--border), 4px 0 16px rgba(0,0,0,.04); }
[data-theme="light"] .slide-panel { box-shadow: var(--shadow-panel); }
[data-theme="light"] .modal { box-shadow: 0 8px 32px rgba(0,0,0,.12); }
[data-theme="light"] .hamburger { box-shadow: var(--shadow-card); }
[data-theme="light"] .badge-green { background: rgba(21,128,61,.12); }
[data-theme="light"] .badge-yellow { background: rgba(180,83,9,.12); }

/* smooth theme transitions */
body, .sidebar, .main, .card, .slide-panel, .panel-header, .panel-footer,
.modal, .hamburger, .theme-toggle, thead th, tfoot td, .form-control,
.filter-select, .nav-item, .table-wrap {
  transition: background-color .22s ease, color .18s ease,
              border-color .18s ease, box-shadow .22s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg-base);color:var(--text-primary);display:flex;min-height:100vh;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}

/* SIDEBAR */
.sidebar{width:220px;min-height:100vh;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:50;transition:transform .3s ease;overflow-y:auto}
.sidebar-logo{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:3px;text-transform:uppercase}
.sidebar-logo p{font-size:11px;color:var(--text-muted);margin-top:2px}
.sidebar-tc{padding:10px 20px;border-bottom:1px solid var(--border);font-size:12px}
.sidebar-tc .tc-label{color:var(--text-muted)}
.sidebar-tc .tc-value{color:var(--accent);font-weight:700;font-size:13px}
.sidebar-tc .tc-date{color:var(--text-muted);font-size:10px;margin-top:1px}
.sidebar-nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text-secondary);font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent;user-select:none}
.nav-item:hover{color:var(--text-primary);background:var(--bg-card)}
.nav-item.active{color:var(--text-primary);background:var(--accent-light);border-left-color:var(--accent)}
.nav-item .icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}

/* MAIN */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
.content{flex:1;padding:28px 32px;overflow-y:auto;height:100vh}
.section{display:none}
.section.active{display:block}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.section-title{font-size:22px;font-weight:700}
.section-subtitle{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{padding:16px}
.card-title{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.card-value{font-size:26px;font-weight:700;color:var(--text-primary);line-height:1.2}
.card-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}

/* GRIDS */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}

/* TABLES */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg-base);color:var(--text-muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg-card-hover)}
tbody td{padding:9px 12px;white-space:nowrap;color:var(--text-primary)}
tfoot td{padding:9px 12px;white-space:nowrap;font-weight:600;font-size:12px;color:var(--text-secondary);background:var(--bg-base);border-top:1px solid var(--border)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-gray{background:var(--badge-gray-bg);color:var(--badge-gray-color)}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge-accent{background:var(--accent-light);color:var(--accent)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-blue{background:rgba(96,165,250,.15);color:#60A5FA}
[data-theme="light"] .badge-blue{background:rgba(37,99,235,.10);color:#1D4ED8}

/* SENA PRODUCT LINES */
.sena-product-line{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;padding:10px;background:var(--bg-input);border-radius:8px;border:1px solid var(--border)}
.sena-product-line .product-select{flex:1;min-width:0}
.sena-product-line .price-input{width:110px;flex-shrink:0}
.sena-product-line .remove-btn{flex-shrink:0;margin-top:1px}
.sena-new-product-fields{background:var(--bg-base);border-radius:6px;padding:10px;margin-top:8px;border:1px dashed var(--border)}
.sena-totals{background:var(--bg-base);border-radius:8px;padding:14px;border:1px solid var(--border);margin-top:4px}
.sena-totals-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.sena-totals-row.total{font-weight:700;font-size:15px;padding-top:8px;border-top:1px solid var(--border);margin-top:6px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;font-family:inherit;line-height:1}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
.btn-secondary:hover{color:var(--text-primary);border-color:var(--text-muted)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(239,68,68,.25)}
.btn-danger:hover{background:rgba(239,68,68,.08)}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
.btn-icon{padding:5px 7px;border-radius:6px;font-size:13px}
.btn-ghost{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px;line-height:1}
.btn-ghost:hover{color:var(--text-primary)}

/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-select,.filter-input{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-size:13px;font-family:inherit;padding:7px 12px;outline:none;cursor:pointer}
.filter-select:focus,.filter-input:focus{border-color:var(--border-focus);color:var(--text-primary)}

/* SLIDE PANEL */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;opacity:0;pointer-events:none;transition:opacity .3s}
.panel-overlay.open{opacity:1;pointer-events:all}
.slide-panel{position:fixed;top:0;right:0;width:480px;max-width:100vw;height:100vh;background:var(--bg-card);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;overflow:hidden}
.slide-panel.open{transform:translateX(0)}
.panel-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);flex-shrink:0}
.panel-header h2{font-size:17px;font-weight:600}
.panel-body{padding:24px;flex:1;overflow-y:auto}
.panel-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--bg-card);flex-shrink:0}

/* FORMS */
.form-group{margin-bottom:14px}
.form-group.readonly .form-control{color:var(--text-muted);cursor:default}
label.form-label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:5px}
.form-control{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;font-family:inherit;padding:9px 12px;transition:border-color .15s;outline:none;appearance:none}
.form-control:focus{border-color:var(--border-focus)}
.form-control[readonly]{color:var(--text-muted)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:3px}
.form-section-title{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;width:380px;max-width:90vw}
.modal h3{font-size:16px;font-weight:600;margin-bottom:8px}
.modal p{font-size:13px;color:var(--text-secondary);margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

/* COLORS */
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-yellow{color:var(--yellow)}
.text-accent{color:var(--accent)}
.text-muted{color:var(--text-muted)}
.text-secondary{color:var(--text-secondary)}
.text-bold{font-weight:600}

/* DASHBOARD */
.recent-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.recent-item:last-child{border-bottom:none}
.recent-name{font-size:13px;font-weight:500;margin-bottom:1px}
.recent-meta{font-size:11px;color:var(--text-muted)}
.cat-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.cat-label{font-size:12px;color:var(--text-secondary);width:90px;flex-shrink:0}
.cat-track{flex:1;height:5px;background:var(--border);border-radius:100px;overflow:hidden}
.cat-fill{height:100%;border-radius:100px;background:var(--accent)}
.cat-val{font-size:12px;color:var(--text-secondary);width:90px;text-align:right;flex-shrink:0}
.partner-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.partner-row:last-child{border-bottom:none}
.partner-bar{height:6px;background:var(--border);border-radius:100px;margin-top:6px;overflow:hidden;width:160px}
.partner-bar-fill{height:100%;border-radius:100px;transition:width .5s ease}

/* SETTINGS */
.settings-group{margin-bottom:28px}
.settings-group-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:16px}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500;flex:1}
.settings-desc{font-size:12px;color:var(--text-muted);margin-top:2px}

/* SIDEBAR BOTTOM / THEME TOGGLE */
.sidebar-bottom{padding:12px 16px;border-top:1px solid var(--border);margin-top:auto}
.theme-toggle{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;text-align:left}
.theme-toggle:hover{color:var(--text-primary);border-color:var(--text-muted);background:var(--bg-card-hover)}
.theme-toggle .toggle-track{margin-left:auto;width:32px;height:18px;background:var(--border);border-radius:100px;position:relative;transition:background .2s}
.theme-toggle .toggle-track.on{background:var(--accent)}
.theme-toggle .toggle-thumb{position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:100px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.theme-toggle .toggle-thumb.on{transform:translateX(14px)}

/* HAMBURGER */
.hamburger{display:none;position:fixed;top:14px;left:14px;z-index:60;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;font-size:16px;line-height:1}

/* MOBILE OVERLAY */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}

/* ARRIVED BADGE-SELECT */
.arrived-select{appearance:none;-webkit-appearance:none;border:none;border-radius:100px;font-size:11px;font-weight:600;font-family:inherit;padding:3px 10px;cursor:pointer;outline:none;white-space:nowrap}
.arrived-select.arrived-pending{background:var(--badge-gray-bg);color:var(--badge-gray-color)}
.arrived-select.arrived-si{background:rgba(34,197,94,.15);color:var(--green)}
.arrived-select.arrived-no{background:rgba(239,68,68,.15);color:var(--red)}
[data-theme="light"] .arrived-select.arrived-si{background:rgba(21,128,61,.12)}
[data-theme="light"] .arrived-select.arrived-no{background:rgba(185,28,28,.12)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.mobile-open{transform:translateX(0)}
  .sidebar-overlay{display:none}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0}
  .content{padding:16px;padding-top:56px;height:auto;min-height:100vh}
  .hamburger{display:block}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
  .section-header{flex-direction:column;align-items:flex-start}
  .slide-panel{width:100vw}
  .form-row{grid-template-columns:1fr}
}
@media(max-width:480px){
  .grid-3,.grid-4{grid-template-columns:1fr}
}

function mergeArrayData(local, cloud){
  // Preserva items locales con IDs que no existen en cloud (entradas nuevas sin sync)
  if(!Array.isArray(local) || !Array.isArray(cloud)) return cloud;
  const cloudIds = new Set(cloud.map(i=>i.id).filter(Boolean));
  const localOnly = local.filter(i=>i.id && !cloudIds.has(i.id));
  return localOnly.length > 0 ? [...cloud, ...localOnly] : cloud;
}

async function syncFromCloud(){
  const COLL_KEYS = ['amp_inv','amp_sales','amp_exp','amp_partners','amp_settings','amp_init','amp_senas','amp_combos','amp_val_products','amp_val_settings','amp_val_combos'];
  const ALL_KEYS  = ['amp_tombstones', ...COLL_KEYS];
  try {
    const {data,error} = await _sb.from('app_state').select('key,value,updated_at');
    if(error) throw error;

    if(data && data.length){
      const cloudMap = Object.fromEntries(data.map(r=>[r.key, r]));
      const toPush = [];

      // ── 1. Tombstones: siempre union-merge (nunca se pierden borrados) ──
      const localTombRaw = localStorage.getItem('amp_tombstones');
      const localTombs   = localTombRaw ? JSON.parse(localTombRaw) : [];
      const cloudTombRow = cloudMap['amp_tombstones'];
      const cloudTombs   = cloudTombRow ? (cloudTombRow.value || []) : [];
      const mergedTombs  = unionTombstones(localTombs, cloudTombs);
      localStorage.setItem('amp_tombstones', JSON.stringify(mergedTombs));
      localStorage.setItem('amp_tombstones_ts', new Date().toISOString());
      if(JSON.stringify(mergedTombs) !== JSON.stringify(cloudTombs)) toPush.push('amp_tombstones');

      // ── 2. Colecciones: timestamp gana, pero siempre se aplican tombstones ──
      for(const k of COLL_KEYS){
        const localTs  = localStorage.getItem(k+'_ts');
        const cloudRow = cloudMap[k];

        if(!cloudRow){
          if(localStorage.getItem(k)) toPush.push(k);
        } else if(localTs && localTs > cloudRow.updated_at){
          // Local más nuevo — subir tal cual (ya no tiene los borrados)
          toPush.push(k);
        } else if(!localTs){
          // Bootstrap: cloud gana pero preservamos items locales nuevos, luego aplicamos tombstones
          const localRaw = localStorage.getItem(k);
          if(localRaw){
            const localVal = JSON.parse(localRaw);
            let merged = mergeArrayData(localVal, cloudRow.value);
            merged = applyTombstones(merged);
            localStorage.setItem(k, JSON.stringify(merged));
            if(JSON.stringify(merged) !== JSON.stringify(cloudRow.value)) toPush.push(k);
          } else {
            localStorage.setItem(k, JSON.stringify(applyTombstones(cloudRow.value)));
          }
          localStorage.setItem(k+'_ts', cloudRow.updated_at);
        } else {
          // Nube más nueva — bajar y aplicar tombstones antes de guardar
          localStorage.setItem(k, JSON.stringify(applyTombstones(cloudRow.value)));
          localStorage.setItem(k+'_ts', cloudRow.updated_at);
        }
      }

      for(const k of toPush){
        const raw = localStorage.getItem(k);
        const ts  = new Date().toISOString();
        if(raw){
          const {error:e} = await _sb.from('app_state').upsert({key:k, value:JSON.parse(raw), updated_at:ts});
          if(e) console.warn('Supabase push failed:', k, e.message);
          else localStorage.setItem(k+'_ts', ts);
        }
      }
    } else {
      // Cloud vacío — subir todos los datos locales
      for(const k of ALL_KEYS){
        const raw = localStorage.getItem(k);
        if(raw){
          const ts = new Date().toISOString();
          const {error:e} = await _sb.from('app_state').upsert({key:k, value:JSON.parse(raw), updated_at:ts});
          if(!e) localStorage.setItem(k+'_ts', ts);
        }
      }
    }
  } catch(e){ console.warn('Cloud sync failed:',e.message); }
}

function addTombstone(id){
  const t = getTombstones();
  if(!t.find(x=>x.id===id)){ t.push({id, deleted_at:new Date().toISOString()}); saveTombstones(t); }
}
function unionTombstones(a,b){
  const m={};
  [...(a||[]),...(b||[])].forEach(t=>{ if(!m[t.id]||t.deleted_at>m[t.id].deleted_at) m[t.id]=t; });
  return Object.values(m);
}
function applyTombstones(items){
  if(!Array.isArray(items)) return items;
  const ids = new Set(getTombstones().map(t=>t.id));
  return items.filter(i=>!ids.has(i.id));
}

    const tc = parseFloat(d.venta);
    if(!isNaN(tc) && tc>0){

      s.tc_date = new Date().toISOString();
      saveSettings(s);

      if(!silent) renderCurrentSection();

  return false;
}

// ─── CALC HELPERS ─────────────────────────────────────────────────────────────

// Costo de una venta (simple o combo). Único lugar donde se resuelve esto.
function getSaleCogs(sale, inv, combos, tc){
  if(sale.combo_id){
    const combo = combos.find(c=>c.id===sale.combo_id);
    if(!combo) return 0;
    return (combo.items||[]).reduce((a,ci)=>{
      const it = inv.find(i=>i.id===ci.inventory_id);
      return a + (it ? calcItem(it,tc).total : 0);
    }, 0);
  }
  const item = inv.find(i=>i.id===sale.inventory_id);
  return item ? calcItem(item,tc).total : 0;
}

function calcItem(item, tc){
  const total = (parseFloat(item.cost_usd)||0) + (parseFloat(item.tax_usd)||0);
  const totalARS = total * tc;
  const sp = parseFloat(item.sale_price_usd)||0;
  const spARS = parseFloat(item.sale_price_ars)||0;
  // Para precio de venta: usar tc histórico del item si existe, sino tc actual
  const saleTc = item.tc_at_date || tc;
  const effectiveSP = sp > 0 ? sp : (spARS > 0 ? spARS/saleTc : 0);
  const margin = effectiveSP > 0 ? effectiveSP - total : null;
  const marginPct = effectiveSP > 0 ? (margin/total*100) : null;
  const marginPctIngresos = effectiveSP > 0 ? (margin/effectiveSP*100) : null;
  return {total, totalARS, sp, spARS, effectiveSP, margin, marginPct, marginPctIngresos};
}

function calcExpEquiv(exp, tc){
  const localTc = exp.tc_at_date || tc;
  const usd = parseFloat(exp.amount_usd)||0;
  const ars = parseFloat(exp.amount_ars)||0;
  if(usd>0) return usd;
  if(ars>0) return ars/localTc;
  return 0;
}

  const sales = getSales();
  const ambos_inv  = movs.filter(m=>m.partner==='Ambos'&&(m.type||'compra')==='compra').reduce((a,m)=>a+(parseFloat(m.amount_usd)||0),0);
  const frank_inv  = movs.filter(m=>m.partner==='Frank'&&(m.type||'compra')==='compra').reduce((a,m)=>a+(parseFloat(m.amount_usd)||0),0) + ambos_inv/2;
  const santi_inv  = movs.filter(m=>m.partner==='Santi'&&(m.type||'compra')==='compra').reduce((a,m)=>a+(parseFloat(m.amount_usd)||0),0) + ambos_inv/2;
  const frank_cob  = sales.reduce((a,s)=>a+(parseFloat(s.frank_collected_usd)||0),0);
  const santi_cob  = sales.reduce((a,s)=>a+(parseFloat(s.santi_collected_usd)||0),0);
  const santi_pago = movs.filter(m=>m.partner==='Santi'&&m.type==='pago').reduce((a,m)=>a+(parseFloat(m.amount_usd)||0),0);
  const frank_pago = movs.filter(m=>m.partner==='Frank'&&m.type==='pago').reduce((a,m)=>a+(parseFloat(m.amount_usd)||0),0);
  const raw    = ((frank_inv - santi_inv) - (frank_cob - santi_cob)) / 2;
  const balance= raw - santi_pago + frank_pago;
  return { frank_inv, santi_inv, frank_cob, santi_cob, santi_pago, frank_pago, balance };
}

// ─── MONTHLY DATA HELPER ──────────────────────────────────────────────────────
function buildMonthlyData(n=6){
  const inv = getInventory();
  const sales = getSales();
  const exp = getExpenses();
  const combos = getCombos();
  const tc = currentTC;

  const months = [];
  const now = new Date();
  for(let i=n-1; i>=0; i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleString('es-AR',{month:'short',year:'2-digit'}).replace('. ','\'');
    months.push({key, label, gastos_op:0, ingresos:0, cogs:0, margen_bruto:0, margen_neto:0, ventas_count:0,
      por_canal:{MercadoLibre:0, Directo:0, Fractal:0, Otro:0}});
  }
  const idx = {};
  months.forEach((m,i)=>idx[m.key]=i);

  // Gastos operativos: usar tc_at_date propio de cada gasto
  exp.forEach(e=>{
    const mk = (e.date||'').substring(0,7);
    if(idx[mk]===undefined) return;
    months[idx[mk]].gastos_op += calcExpEquiv(e, tc);
  });

  // Ingresos y COGS: solo ventas entregadas, fechadas por entrega_date
  sales.filter(s=>s.estado==='entregado').forEach(s=>{
    const mk = (s.entrega_date||s.sale_date||'').substring(0,7);
    if(idx[mk]===undefined) return;
    const m = months[idx[mk]];
    m.ventas_count++;
    const sp = parseFloat(s.sale_price_usd)||0;
    m.ingresos += sp;
    m.cogs += getSaleCogs(s, inv, combos, tc);
    const ch = s.channel||'Otro';
    if(m.por_canal[ch]!==undefined) m.por_canal[ch]+=sp; else m.por_canal['Otro']+=sp;
  });

  let cumulative = 0;
  months.forEach(m=>{
    m.margen_bruto = m.ingresos - m.cogs;
    m.margen_neto  = m.margen_bruto - m.gastos_op;
    cumulative += m.margen_neto;
    m.margen_neto_acum = cumulative;
  });

  return months;
}

// ─── CASH LEDGER & FINANCIAL METRICS ─────────────────────────────────────────

// Reconcilia courier: fuente primaria = INIT_PARTNERS. Si hay un gasto Courier en
// INIT_EXPENSES sin match exacto (monto+fecha) en PARTNERS, también se suma a la caja.
function buildCashLedger(){
  const inv      = getInventory();
  const sales    = getSales();
  const exp      = getExpenses();
  const partners = getPartners();
  const senas    = getSenas();
  const tc       = currentTC;
  const movements = [];

  // ENTRADAS: aportes de socios (type:'pago' en PARTNERS)
  partners.filter(p=>p.type==='pago').forEach(p=>{
    movements.push({date:p.date, tipo:'aporte', dir:'in',
      amount_usd:parseFloat(p.amount_usd)||0, ref:p.id, desc:p.description});
  });

  // ENTRADAS: señas cobradas (status !== 'Cancelada')
  senas.forEach(s=>{
    if(s.status==='Cancelada') return;
    const senaAmt = parseFloat(s.sena_amount_usd)||0;
    if(senaAmt>0) movements.push({date:s.date, tipo:'seña_cobrada', dir:'in',
      amount_usd:senaAmt, ref:s.id, desc:`Seña — ${s.customer_name||''}`});
    if(s.status==='Completada' && s.completed_date){
      const totalPactado = (s.products||[]).reduce((a,p)=>a+(parseFloat(p.agreed_price_usd)||0),0);
      const saldo = totalPactado - senaAmt;
      if(saldo>0) movements.push({date:s.completed_date, tipo:'saldo_cobrado', dir:'in',
        amount_usd:saldo, ref:s.id, desc:`Saldo — ${s.customer_name||''}`});
    }
  });

  // ENTRADAS: cobros de ventas directas (sin seña vinculada, estado='entregado')
  const saleIdsFromSenas = new Set(senas.flatMap(s=>s.sale_ids||[]));
  sales.filter(s=>s.estado==='entregado' && !saleIdsFromSenas.has(s.id)).forEach(s=>{
    const sp = parseFloat(s.sale_price_usd)||0;
    if(sp>0) movements.push({date:s.entrega_date||s.sale_date, tipo:'cobro_venta', dir:'in',
      amount_usd:sp, ref:s.id, desc:`Venta ${s.id}`});
  });

  // APORTES IMPLÍCITOS + SALIDAS: cada compra representa capital puesto por el socio
  // que inmediatamente sale como pago al proveedor (neto = 0 por compra)
  const courierFromPartners = partners.filter(p=>p.type==='compra' && /courier/i.test(p.description||''));
  const productFromPartners = partners.filter(p=>p.type==='compra' && !/courier/i.test(p.description||''));
  [...courierFromPartners, ...productFromPartners].forEach(p=>{
    const amt = parseFloat(p.amount_usd)||0;
    movements.push({date:p.date, tipo:'aporte_socio', dir:'in',
      amount_usd:amt, ref:p.id, desc:`Aporte ${p.partner} — ${p.description}`});
  });
  courierFromPartners.forEach(p=>{
    movements.push({date:p.date, tipo:'courier', dir:'out',
      amount_usd:parseFloat(p.amount_usd)||0, ref:p.id, desc:p.description});
  });
  productFromPartners.forEach(p=>{
    movements.push({date:p.date, tipo:'compra_producto', dir:'out',
      amount_usd:parseFloat(p.amount_usd)||0, ref:p.id, desc:p.description});
  });

  // SALIDAS: courier de INIT_EXPENSES sin match exacto en PARTNERS (reconciliación)
  exp.filter(e=>e.category==='Courier').forEach(e=>{
    const amt = calcExpEquiv(e, tc);
    const alreadyCounted = courierFromPartners.some(p=>
      Math.abs(parseFloat(p.amount_usd)-amt)<0.01 && p.date===e.date
    );
    if(!alreadyCounted) movements.push({date:e.date, tipo:'courier_extra', dir:'out',
      amount_usd:amt, ref:e.id, desc:e.description});
  });

  // SALIDAS: opex (IT, Pauta, CM, Varios — excluyendo Courier ya contado desde PARTNERS)
  exp.filter(e=>e.category!=='Courier').forEach(e=>{
    const amt = calcExpEquiv(e, tc);
    if(amt>0) movements.push({date:e.date, tipo:'gasto_op', dir:'out',
      amount_usd:amt, ref:e.id, desc:e.description});
  });

  movements.sort((a,b)=>a.date.localeCompare(b.date));
  let saldo = 0;
  movements.forEach(m=>{
    saldo += m.dir==='in' ? m.amount_usd : -m.amount_usd;
    m.saldo_usd = saldo;
  });
  return movements;
}

function getCajaActual(){
  const ledger = buildCashLedger();
  return ledger.length>0 ? ledger[ledger.length-1].saldo_usd : 0;
}

// Burn operativo promedio mensual (últimos n meses).
// Excluye pagos a proveedor porque escalan con ventas; solo IT + Pauta + CM + Varios.
function getGastoOpPromMensual(n=3){
  const exp = getExpenses();
  const tc  = currentTC;
  const now = new Date();
  let total = 0;
  exp.forEach(e=>{
    if(e.category==='Courier') return;
    const d = new Date(e.date+'T00:00:00');
    const diffMonths = (now.getFullYear()-d.getFullYear())*12 + (now.getMonth()-d.getMonth());
    if(diffMonths>=0 && diffMonths<n) total += calcExpEquiv(e, tc);
  });
  return n>0 ? total/n : 0;
}

function getRunway(){
  const burn = getGastoOpPromMensual();
  if(burn<=0) return Infinity;
  return getCajaActual()/burn;
}

function getCapitalCongelado(){
  const inv = getInventory();
  const tc  = currentTC;
  return inv.filter(i=>i.status!=='Vendido')
    .reduce((a,i)=>a+calcItem(i,tc).total, 0);
}

function getCapitalInvertidoTotal(){
  return getPartners()
    .filter(p=>p.type==='compra')
    .reduce((a,p)=>a+(parseFloat(p.amount_usd)||0), 0);
}

function getSellThrough(){
  const inv = getInventory();
  const vendidos = inv.filter(i=>i.status==='Vendido').length;
  const total    = inv.filter(i=>i.status==='Vendido'||i.status==='En Stock'||i.status==='Reservado').length;
  return total>0 ? vendidos/total : 0;
}

function getAgingInventario(){
  const inv = getInventory();
  const hoy = new Date();
  return inv.filter(i=>i.status!=='Vendido').map(i=>{
    const d = new Date((i.purchase_date||'2025-01-01')+'T00:00:00');
    const dias = Math.floor((hoy-d)/(1000*60*60*24));
    return {item:i, dias, capital:calcItem(i,currentTC).total};
  }).sort((a,b)=>b.dias-a.dias);
}

function getAnticiposClientes(){
  const senas = getSenas();
  return senas.filter(s=>s.status==='Activa').reduce((a,s)=>{
    return a+(parseFloat(s.sena_amount_usd)||0);
  },0);
}

function getBreakEven(){
  const burn = getGastoOpPromMensual();
  const sales = getSales().filter(s=>s.estado==='entregado');
  if(sales.length===0) return null;
  const inv = getInventory();
  const tc  = currentTC;
  let totalMargin = 0;
  sales.forEach(s=>{
    const item = inv.find(i=>i.id===s.inventory_id);
    if(item){ const c=calcItem(item,tc); if(c.margin) totalMargin+=c.margin; }
  });
  const avgMargin = totalMargin/sales.length;
  return avgMargin>0 ? burn/avgMargin : null;
}

function getCAC(){
  // Atribución combinada: gasto total Pauta+CM / total ventas del período.
  // Limitación: no distingue ventas orgánicas de pagas — usar como referencia orientativa.
  const exp   = getExpenses();
  const sales = getSales().filter(s=>s.estado==='entregado');
  const tc    = currentTC;
  const mktSpend = exp.filter(e=>e.category==='Pauta'||e.category==='CM')
    .reduce((a,e)=>a+calcExpEquiv(e,tc),0);
  return sales.length>0 ? mktSpend/sales.length : 0;
}

function getROAS(){
  // Ingresos totales de ventas entregadas / gasto total en Pauta+CM.
  // Misma limitación de atribución que getCAC.
  const exp   = getExpenses();
  const sales = getSales().filter(s=>s.estado==='entregado');
  const tc    = currentTC;
  const mktSpend = exp.filter(e=>e.category==='Pauta'||e.category==='CM')
    .reduce((a,e)=>a+calcExpEquiv(e,tc),0);
  const ingresos = sales.reduce((a,s)=>a+(parseFloat(s.sale_price_usd)||0),0);
  return mktSpend>0 ? ingresos/mktSpend : 0;
}

              <div style="text-align:right"><div style="font-weight:600">${fUSD(equiv)}</div><div class="recent-meta">${e.amount_ars>0?fARS(e.amount_ars)+' ARS':''}</div></div>
            </div>`;
          }).join('')
        }
      </div>
    </div>
  `;
  requestAnimationFrame(()=>renderDashCharts(dashPeriod));
}

function changeDashPeriod(n){
  dashPeriod = n;

}

function renderDashCharts(n){
  if(typeof Chart==='undefined') return;
  const data = buildMonthlyData(n);
  const labels = data.map(m=>m.label);
  const isDark = document.documentElement.getAttribute('data-theme')!=='light';
  const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const tickColor = isDark ? '#888' : '#999';
  const tooltipBg = isDark ? '#1A1A1A' : '#fff';
  const tooltipBorder = isDark ? '#2C2C2C' : '#e5e7eb';

  const baseOpts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false},
      tooltip:{backgroundColor:tooltipBg,borderColor:tooltipBorder,borderWidth:1,titleColor:isDark?'#fff':'#111',bodyColor:tickColor,callbacks:{label:ctx=>' '+fUSD(ctx.parsed.y)}}},
    scales:{
      x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:11}}},
      y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:11},callback:v=>'$'+Math.round(v)}}
    }
  };

  // Hero chart: Evolución de Caja (from ledger, grouped by month)
  const cCaja = document.getElementById('chart-dash-caja');
  if(cCaja){
    Chart.getChart(cCaja)?.destroy();
    const ledger = buildCashLedger();
    // Group saldo by month label (take last saldo per month)
    const cajaByMonth = {};
    ledger.forEach(mv=>{
      const mk = mv.date ? mv.date.substring(0,7) : null;
      if(mk) cajaByMonth[mk] = mv.saldo_usd;
    });
    // Align to the same n-month window using the key already in buildMonthlyData
    const cajaFinal = data.map(m=>cajaByMonth[m.key]??0);
    const lastVal = cajaFinal[cajaFinal.length-1]??0;
    new Chart(cCaja,{type:'line',data:{labels,datasets:[{
      label:'Caja',data:cajaFinal,
      borderColor:lastVal>=0?'#22C55E':'#EF4444',
      backgroundColor:lastVal>=0?'rgba(34,197,94,0.08)':'rgba(239,68,68,0.08)',
      borderWidth:2,pointRadius:4,fill:true,tension:0.35,
      pointBackgroundColor:cajaFinal.map(v=>v>=0?'#22C55E':'#EF4444')
    }]},options:{...baseOpts,
      plugins:{...baseOpts.plugins,legend:{display:false},
        tooltip:{...baseOpts.plugins.tooltip,callbacks:{label:ctx=>' Caja: '+fUSD(ctx.parsed.y)}}},
      scales:{...baseOpts.scales,y:{...baseOpts.scales.y,
        grid:{...baseOpts.scales.y.grid,color:ctx=>ctx.tick.value===0?'rgba(255,255,255,0.2)':gridColor},
        ticks:{...baseOpts.scales.y.ticks,callback:v=>'$'+Math.round(v)}}}}});
  }

  // Chart 2: Ventas por mes vs Break-Even
  const cBE = document.getElementById('chart-dash-breakeven');
  if(cBE){
    Chart.getChart(cBE)?.destroy();
    const be = getBreakEven();
    const ventasCounts = data.map(m=>m.ventas_count||0);
    new Chart(cBE,{type:'bar',data:{labels,datasets:[
      {label:'Ventas',data:ventasCounts,backgroundColor:'rgba(59,130,246,0.5)',borderColor:'#3B82F6',borderWidth:1.5,borderRadius:4},
      ...(be!=null&&isFinite(be) ? [{
        label:`Break-Even (${Math.ceil(be)})`,
        data:data.map(()=>Math.ceil(be)),
        type:'line',borderColor:'#F59E0B',borderWidth:1.5,borderDash:[4,4],
        pointRadius:0,fill:false,tension:0
      }] : [])
    ]},options:{...baseOpts,
      plugins:{...baseOpts.plugins,legend:{display:be!=null&&isFinite(be),labels:{color:tickColor,font:{size:11},boxWidth:12}},
        tooltip:{...baseOpts.plugins.tooltip,callbacks:{label:ctx=>ctx.dataset.label==='Ventas'?' '+ctx.parsed.y+' ventas':' umbral: '+ctx.parsed.y}}},
      scales:{...baseOpts.scales,y:{...baseOpts.scales.y,
        ticks:{...baseOpts.scales.y.ticks,callback:v=>Math.round(v),stepSize:1},beginAtZero:true}}}});
  }

  // Chart 3: Margen Neto Mensual
  const cNM = document.getElementById('chart-net-margin');
  if(cNM){ Chart.getChart(cNM)?.destroy(); new Chart(cNM,{type:'line',data:{labels,datasets:[{
    label:'Margen neto',
    data:data.map(m=>m.margen_neto),
    segment:{borderColor:ctx=>ctx.p1.parsed.y>=0?'#22C55E':'#EF4444',backgroundColor:ctx=>ctx.p1.parsed.y>=0?'rgba(34,197,94,0.1)':'rgba(239,68,68,0.1)'},
    backgroundColor:'rgba(34,197,94,0.08)',borderWidth:2,pointRadius:3,
    pointBackgroundColor:data.map(m=>m.margen_neto>=0?'#22C55E':'#EF4444'),fill:true,tension:0.3
  }]},options:{...baseOpts,
    scales:{...baseOpts.scales,y:{...baseOpts.scales.y,
      ticks:{...baseOpts.scales.y.ticks,callback:v=>'$'+Math.round(v)},
      grid:{...baseOpts.scales.y.grid,color:ctx=>ctx.tick.value===0?'rgba(255,255,255,0.2)':gridColor}}}}});}
}

let finPeriod = 6;

function renderFinanzas(){
  const inv     = getInventory();
  const combos  = getCombos();
  const sales   = getSales().filter(s=>s.estado==='entregado');
  const exp     = getExpenses();
  const tc      = currentTC;

  // ── Liquidez ──
  const caja       = getCajaActual();
  const cajaARS    = caja * tc;
  const runway     = getRunway();
  const anticipos  = getAnticiposClientes();
  const runwayColor = runway===Infinity||runway>=6 ? '#22C55E' : runway>=2 ? '#F59E0B' : '#EF4444';
  const runwayLabel = runway===Infinity ? '∞' : isNaN(runway)||runway<0 ? '—' : runway.toFixed(1);

  // ── Rentabilidad ──
  let ingresos=0, cogs=0;
  sales.forEach(s=>{
    ingresos += parseFloat(s.sale_price_usd)||0;
    cogs += getSaleCogs(s, inv, combos, tc);
  });
  const margenBruto  = ingresos - cogs;
  const margenNeto   = margenBruto - exp.filter(e=>e.category!=='Courier').reduce((a,e)=>a+calcExpEquiv(e,tc),0)
                                   - exp.filter(e=>e.category==='Courier').reduce((a,e)=>a+calcExpEquiv(e,tc),0);
  const markupPct    = cogs>0    ? (margenBruto/cogs*100)     : 0;
  const margenPctIng = ingresos>0 ? (margenBruto/ingresos*100) : 0;
  const margenNetoPct= ingresos>0 ? (margenNeto/ingresos*100)  : 0;

  // ── Capital ──
  const capitalTotal    = getCapitalInvertidoTotal();
  const capitalCongelado= getCapitalCongelado();
  const vendidos        = inv.filter(i=>i.status==='Vendido').length;
  const enStock         = inv.filter(i=>i.status==='En Stock').length;
  const reservados      = inv.filter(i=>i.status==='Reservado').length;
  const sellThrough     = getSellThrough();

  // ── Planificación ──
  const breakEven = getBreakEven();
  const ventasEsteMes = (() => {
    const hoy = new Date();
    const mk = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}`;
    return sales.filter(s=>(s.entrega_date||s.sale_date||'').startsWith(mk)).length;
  })();

  // ── Marketing ──
  const cac  = getCAC();
  const roas = getROAS();
  const salesByChannel = {};
  const marginByChannel = {};
  sales.forEach(s=>{
    const ch = s.channel||'Otro';
    salesByChannel[ch] = (salesByChannel[ch]||0)+1;
    const item = inv.find(i=>i.id===s.inventory_id);
    if(item){ const c=calcItem(item,tc); marginByChannel[ch]=(marginByChannel[ch]||0)+(c.margin||0); }
  });

  // ── Gastos por categoría ──
  const catExp = {IT:0,Courier:0,Pauta:0,CM:0,Varios:0};
  exp.forEach(e=>{ if(e.category in catExp) catExp[e.category]+=calcExpEquiv(e,tc); });
  const maxExp = Math.max(...Object.values(catExp),0.01);

  document.getElementById('section-finanzas').innerHTML = `
    <div class="section-header">
      <h2 class="section-title">Finanzas</h2>
      <div style="display:flex;gap:8px">
        ${[3,6,12].map(n=>`<button class="btn${finPeriod===n?' btn-primary':' btn-ghost'}" onclick="finPeriod=${n};renderFinanzas()">${n}m</button>`).join('')}
      </div>
    </div>

    <!-- LIQUIDEZ -->
    <div class="section-subtitle" style="margin:0 0 12px">Liquidez</div>
    <div class="grid-4" style="margin-bottom:20px">
      <div class="card" style="grid-column:span 2">
        <div class="card-title">Caja actual</div>
        <div class="card-value" style="font-size:2rem">${fUSD(caja)}</div>
        <div class="card-sub">${fARS(cajaARS)} al TC de hoy</div>
      </div>
      <div class="card">
        <div class="card-title">Runway</div>
        <div class="card-value" style="color:${runwayColor}">${runwayLabel} <span style="font-size:1rem;font-weight:400">meses</span></div>
        <div class="card-sub">Burn opex ≈ ${fUSD(getGastoOpPromMensual())}/mes</div>
      </div>
      <div class="card" style="border:1px solid #F59E0B22">
        <div class="card-title" style="color:#F59E0B">Anticipos clientes</div>
        <div class="card-value" style="font-size:1.5rem">${fUSD(anticipos)}</div>
        <div class="card-sub">Pasivo — señas no entregadas</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-title" style="margin-bottom:4px">Evolución de Caja</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">Saldo real de caja por fecha (aportes, cobros, pagos proveedor, opex)</div>
      <div style="position:relative;height:220px"><canvas id="chart-caja-evol"></canvas></div>
    </div>

    <!-- RENTABILIDAD -->

    <div class="grid-4" style="margin-bottom:16px">
      <div class="card card-sm"><div class="card-title">Ingresos</div><div class="card-value" style="font-size:1.4rem">${fUSD(ingresos)}</div><div class="card-sub">Solo entregados</div></div>
      <div class="card card-sm"><div class="card-title">Margen Bruto</div><div class="card-value" style="font-size:1.4rem;${margenBruto<0?'color:#EF4444':''}">${fUSD(margenBruto)}</div><div class="card-sub">${margenPctIng.toFixed(1)}% s/ ingresos</div></div>
      <div class="card card-sm"><div class="card-title">Markup s/ costo</div><div class="card-value" style="font-size:1.4rem">${markupPct.toFixed(1)}%</div><div class="card-sub">Para pricing</div></div>
      <div class="card card-sm"><div class="card-title">Margen s/ ingresos</div><div class="card-value" style="font-size:1.4rem">${margenPctIng.toFixed(1)}%</div><div class="card-sub">Rentabilidad real</div></div>

        </div>
        <div class="card-sub">Acumulado histórico (desde inicio)</div>
      </div>
      <div class="card"><div class="card-title" style="margin-bottom:12px">Margen Neto Acumulado</div>
        <div style="position:relative;height:120px"><canvas id="chart-fin-margen-acum"></canvas></div>
      </div>
    </div>
    <div class="grid-2" style="margin-bottom:20px">
      <div class="card"><div class="card-title" style="margin-bottom:4px">P&amp;L Mensual Desglosado</div>

      </div>
      <div class="card"><div class="card-title" style="margin-bottom:4px">Costo Operativo vs Margen Bruto</div>

      <div class="card card-sm"><div class="card-title">Capital Congelado</div><div class="card-value" style="font-size:1.3rem;color:#F59E0B">${fUSD(capitalCongelado)}</div><div class="card-sub">Stock sin vender</div></div>
      <div class="card card-sm"><div class="card-title">Sell-Through</div><div class="card-value" style="font-size:1.3rem">${(sellThrough*100).toFixed(0)}%</div><div class="card-sub">${vendidos} vendidos · ${enStock} stock · ${reservados} reservados</div></div>
      <div class="card card-sm"><div class="card-title">Ítems en Stock</div><div class="card-value" style="font-size:1.3rem">${enStock}</div><div class="card-sub">${reservados} reservados</div></div>
    </div>

    <!-- PLANIFICACIÓN -->

    pointBackgroundColor:data.map(m=>m.margen_neto>=0?'#22C55E':'#EF4444'),fill:true,tension:0.3
  }]},options:{...baseOpts,plugins:{...baseOpts.plugins,legend:{display:false}},
    scales:{...baseOpts.scales,y:{...baseOpts.scales.y,grid:{...baseOpts.scales.y.grid,color:ctx=>ctx.tick.value===0?'rgba(255,255,255,0.2)':gridColor}}}}}); }

  // Ventas vs Break-Even
  const cBE = document.getElementById('chart-fin-breakeven');
  if(cBE){
    const inv   = getInventory();
    const tc    = currentTC;
    const allSales = getSales().filter(s=>s.estado==='entregado');
    const salesPerMonth = data.map(m=>{
      return allSales.filter(s=>(s.entrega_date||s.sale_date||'').startsWith(m.key)).length;
    });
    const be = getBreakEven();
    Chart.getChart(cBE)?.destroy();
    new Chart(cBE,{type:'bar',data:{labels,datasets:[
      {label:'Ventas realizadas',data:salesPerMonth,backgroundColor:salesPerMonth.map(v=>v>=(be||Infinity)?'rgba(34,197,94,0.5)':'rgba(232,98,44,0.4)'),borderColor:salesPerMonth.map(v=>v>=(be||Infinity)?'#22C55E':'#E8622C'),borderWidth:1.5,borderRadius:4},
      ...(be!=null?[{label:`Break-even (${Math.ceil(be)})`,data:data.map(()=>be),type:'line',borderColor:'#F59E0B',borderWidth:2,pointRadius:0,borderDash:[6,3]}]:[])
    ]},options:{...baseOpts,plugins:{...baseOpts.plugins,tooltip:{...baseOpts.plugins.tooltip,callbacks:{label:ctx=>ctx.dataset.type==='line'?' Break-even: '+fUSD(ctx.parsed.y):` ${ctx.parsed.y} ventas`}}},
      scales:{...baseOpts.scales,y:{...baseOpts.scales.y,ticks:{...baseOpts.scales.y.ticks,callback:v=>Math.round(v)}}}}}); }
}

// ─── INVENTORY ────────────────────────────────────────────────────────────────
function renderInventory(){
  const inv = getInventory();
  const tc = currentTC;
  let filtered = inv.filter(i=>{
    if(invFilter.status && i.status!==invFilter.status) return false;
    if(invFilter.category && i.category!==invFilter.category) return false;
    return true;
  });

  const cats = ['Headphones','Streamer','Amplificador','Tocadiscos','DAC','Speakers'];

  const rows = filtered.map(item=>{
    const c = calcItem(item,tc);
    const mc = colorMargin(c.marginPct);
    return `<tr>
      <td>${item.id}</td>
      <td style="max-width:200px;white-space:normal;min-width:140px">${item.description}</td>
      <td>${item.category}</td>
      <td>${fUSD(item.cost_usd)}</td>
      <td>${fUSD(item.tax_usd)}</td>
      <td class="text-bold">${fUSD(c.total)}</td>
      <td>${fARS(c.totalARS)}</td>
      <td>${fDate(item.purchase_date)}</td>
      <td>${statusBadge(item.status)}</td>
      <td>${arrivedArgSelect(item.id, item.arrived_arg||'')}</td>
      <td>${c.sp>0?fUSD(c.sp):'—'}</td>
      <td>${c.spARS>0?fARS(c.spARS):'—'}</td>
      <td class="${mc}">${c.margin!==null?fUSD(c.margin):'—'}</td>
      <td class="${mc}">${fPct(c.marginPct)}</td>
      <td>${item.collected_by||'—'}</td>
      <td style="max-width:140px;white-space:normal;min-width:80px;font-size:12px;color:var(--text-muted)">${item.notes||''}</td>
      <td>
        <div class="actions-cell">
          <button class="btn btn-secondary btn-icon btn-sm" onclick="editInventory('${item.id}')">✏️</button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="deleteInventory('${item.id}')">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  const tabBar = `<div style="display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border)">
    <button class="btn btn-sm" style="border-radius:6px 6px 0 0;border-bottom:none;${inventoryTab==='items'?'background:var(--accent);color:#fff;':'background:transparent;color:var(--text-muted);'}" onclick="inventoryTab='items';renderInventory()">Items (${inv.length})</button>
    <button class="btn btn-sm" style="border-radius:6px 6px 0 0;border-bottom:none;${inventoryTab==='combos'?'background:var(--accent);color:#fff;':'background:transparent;color:var(--text-muted);'}" onclick="inventoryTab='combos';renderInventory()">Combos (${getCombos().length})</button>
  </div>`;

  if(inventoryTab === 'combos'){
    document.getElementById('section-inventory').innerHTML = `
      <div class="section-header">
        <h2 class="section-title">Inventario</h2>
        <button class="btn btn-primary btn-sm" onclick="addCombo()">+ Nuevo Combo</button>
      </div>
      ${tabBar}
      ${renderCombosHTML()}
    `;
    return;
  }

  document.getElementById('section-inventory').innerHTML = `
    <div class="section-header">
      <h2 class="section-title">Inventario</h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="exportInvCSV()">⬇️ CSV</button>
        <button class="btn btn-primary btn-sm" onclick="addInventory()">+ Agregar</button>
      </div>
    </div>
    ${tabBar}
    <div class="filters">
      <select class="filter-select" onchange="invFilter.status=this.value;renderInventory()">
        <option value="">Todos los estados</option>
        <option value="En Stock" ${invFilter.status==='En Stock'?'selected':''}>En Stock</option>
        <option value="Vendido" ${invFilter.status==='Vendido'?'selected':''}>Vendido</option>
        <option value="Reservado" ${invFilter.status==='Reservado'?'selected':''}>Reservado</option>
        <option value="En Pedido" ${invFilter.status==='En Pedido'?'selected':''}>En Pedido</option>
      </select>
      <select class="filter-select" onchange="invFilter.category=this.value;renderInventory()">
        <option value="">Todas las categorías</option>
        ${cats.map(c=>`<option value="${c}" ${invFilter.category===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Código</th><th>Descripción</th><th>Categoría</th>
          <th>Costo USD</th><th>Tax+Envío</th><th>Total USD</th><th>Total ARS</th>

function addInventory(){
  openPanel('Agregar Producto', buildInventoryForm(null), (data)=>{
    const inv = getInventory();
    const maxNum = inv.reduce((mx,i)=>{ const n=parseInt(i.id.replace('AMP-',''))||0; return Math.max(mx,n); },0);
    data.id = 'AMP-'+(maxNum+1).toString().padStart(4,'0');
    inv.push(data);
    saveInventory(inv);
    renderInventory();
    closePanel();
  });
}

function editInventory(id){
  const inv = getInventory();
  const item = inv.find(i=>i.id===id);
  if(!item) return;
  openPanel('Editar Producto: '+item.id, buildInventoryForm(item), (data)=>{
    const idx = inv.findIndex(i=>i.id===id);
    inv[idx] = {...item, ...data, id:item.id};
    saveInventory(inv);
    renderInventory();
    closePanel();
  });
}

function arrivedArgSelect(id, value){
  const cls = value==='Si'?'arrived-si':value==='No'?'arrived-no':'arrived-pending';
  return `<select class="arrived-select ${cls}" onchange="setArrivedArg('${id}',this.value)">
    <option value="" ${!value?'selected':''}>— Pendiente</option>
    <option value="Si" ${value==='Si'?'selected':''}>✓ Llegó</option>
    <option value="No" ${value==='No'?'selected':''}>✗ No llegó</option>
  </select>`;
}

function fitSelect(el){
  const span = document.createElement('span');
  span.style.cssText = 'position:absolute;visibility:hidden;font-size:11px;font-weight:600;font-family:inherit;white-space:nowrap;pointer-events:none';
  span.textContent = el.options[el.selectedIndex]?.text || '';
  document.body.appendChild(span);
  el.style.width = (span.offsetWidth + 22) + 'px';
  document.body.removeChild(span);
}

function setArrivedArg(id, value){
  const inv = getInventory();
  const idx = inv.findIndex(i=>i.id===id);
  if(idx<0) return;
  inv[idx].arrived_arg = value;
  saveInventory(inv);
  const cls = value==='Si'?'arrived-si':value==='No'?'arrived-no':'arrived-pending';
  const sel = event.target;
  sel.className = 'arrived-select '+cls;
  fitSelect(sel);
}

function deleteInventory(id){
  confirmDelete(()=>{
    addTombstone(id);
    saveInventory(getInventory().filter(i=>i.id!==id));
    const allSales = getSales();
    allSales.filter(s=>s.inventory_id===id).forEach(s=>addTombstone(s.id));
    saveSales(allSales.filter(s=>s.inventory_id!==id));
    renderInventory();
  });
}

// ─── COMBOS ───────────────────────────────────────────────────────────────────
function renderCombosHTML(){
  const combos = getCombos();
  const inv = getInventory();
  const tc = currentTC;
  if(combos.length === 0) return '<div style="text-align:center;padding:60px;color:var(--text-muted)">Sin combos definidos. Creá uno con "+ Nuevo Combo".</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>Código</th><th>Nombre</th><th>Componentes</th><th>Precio Combo</th><th>Suma Ind.</th><th>Ahorro</th><th>Estado</th><th></th></tr></thead>
    <tbody>${combos.map(combo=>{
      const items = (combo.items||[]).map(ci=>inv.find(i=>i.id===ci.inventory_id)).filter(Boolean);
      const sumInd = items.reduce((a,it)=>a+calcItem(it,tc).total,0);
      const saving = sumInd - (combo.combo_price_usd||0);
      const allAvail = items.length>0 && items.every(it=>it.status==='En Stock'||it.status==='Reservado');
      const pills = items.map(it=>`<span class="badge ${it.status==='En Stock'||it.status==='Reservado'?'badge-green':'badge-gray'}" style="font-size:10px">${it.id}</span>`).join(' ');
      return `<tr>
        <td><span class="badge badge-accent" style="font-size:11px;font-weight:700">${combo.id}</span></td>
        <td style="font-weight:600">${esc(combo.name)}${combo.description?`<div style="font-weight:400;font-size:11px;color:var(--text-muted)">${esc(combo.description)}</div>`:''}</td>
        <td style="white-space:nowrap">${pills||'—'}</td>
        <td class="text-bold" style="color:var(--accent)">${fUSD(combo.combo_price_usd||0)}</td>
        <td style="text-decoration:line-through;color:var(--text-muted)">${fUSD(sumInd)}</td>
        <td style="color:var(--green)">${saving>0?fUSD(saving):'—'}</td>
        <td>${allAvail?'<span class="badge badge-green">Disponible</span>':'<span class="badge badge-gray">No disponible</span>'}</td>
        <td><div class="actions-cell">
          ${allAvail?`<button class="btn btn-primary btn-sm" onclick="sellCombo('${combo.id}')">Vender</button>`:''}
          <button class="btn btn-secondary btn-icon btn-sm" onclick="editCombo('${combo.id}')">✏️</button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="deleteCombo('${combo.id}')">🗑️</button>
        </div></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function collectComboForm(){
  const inv = getInventory();
  const items = inv.filter(item=>{
    const chk = document.getElementById('chk_'+item.id);
    return chk && chk.checked;
  }).map(item=>({inventory_id:item.id}));
  return {
    name: document.getElementById('f_combo_name').value.trim(),
    description: document.getElementById('f_combo_desc').value.trim(),
    combo_price_usd: parseFloat(document.getElementById('f_combo_price').value)||0,
    items,
    notes: document.getElementById('f_combo_notes').value.trim(),
  };
}

function addCombo(){
  openPanel('Nuevo Combo', buildComboForm(null), (data)=>{
    if(!data.name || data.items.length < 2){ alert('El combo necesita un nombre y al menos 2 productos.'); return; }
    const combos = getCombos();
    const maxN = combos.reduce((mx,c)=>{ const n=parseInt(c.id.replace('CMB-',''))||0; return Math.max(mx,n); },0);
    data.id = 'CMB-'+(maxN+1).toString().padStart(4,'0');
    combos.push(data);
    saveCombos(combos);
    renderInventory();
    closePanel();
  });
}

function editCombo(id){
  const combos = getCombos();
  const combo = combos.find(c=>c.id===id);
  if(!combo) return;
  openPanel('Editar Combo: '+combo.id, buildComboForm(combo), (data)=>{
    const idx = combos.findIndex(c=>c.id===id);
    combos[idx] = {...combo,...data,id:combo.id};
    saveCombos(combos);
    renderInventory();
    closePanel();
  });
}

function deleteCombo(id){
  confirmDelete(()=>{
    addTombstone(id);
    saveCombos(getCombos().filter(c=>c.id!==id));
    renderInventory();
  });
}

function sellCombo(id){
  const combo = getCombos().find(c=>c.id===id);
  if(!combo) return;
  const inv = getInventory();
  const items = (combo.items||[]).map(ci=>inv.find(i=>i.id===ci.inventory_id)).filter(Boolean);
  const unavailable = items.filter(i=>i.status!=='En Stock'&&i.status!=='Reservado');
  if(unavailable.length>0){
    alert('Los siguientes productos ya no están disponibles:\n'+unavailable.map(i=>i.id+' — '+i.description).join('\n'));
    return;
  }
  const tc = currentTC;
  const costTotal = items.reduce((a,item)=>a+calcItem(item,tc).total,0);
  openPanel('Vender Combo: '+combo.name, buildComboSaleForm(combo, costTotal), (data)=>{
    // Marcar todos los items como vendidos
    const invUpd = getInventory();
    items.forEach(item=>{
      const idx = invUpd.findIndex(i=>i.id===item.id);
      if(idx>=0){ invUpd[idx].status='Vendido'; invUpd[idx].sale_price_usd=0; }
    });
    saveInventory(invUpd);
    // Crear venta con combo_id
    const sales = getSales();
    const maxN = sales.reduce((mx,s)=>{ const n=parseInt(s.id.replace('VTA-',''))||0; return Math.max(mx,n); },0);
    data.id = 'VTA-'+(maxN+1).toString().padStart(4,'0');
    data.combo_id = combo.id;
    data.inventory_id = null;
    sales.push(data);
    saveSales(sales);
    renderSales();
    closePanel();
    inventoryTab='items';
    renderInventory();
  });
}

// ─── SALES ────────────────────────────────────────────────────────────────────
function renderSales(){
  const sales = getSales();
  const inv = getInventory();
  const tc = currentTC;

  let filtered = sales.filter(s=>{
    if(salesFilter.channel && s.channel!==salesFilter.channel) return false;
    return true;
  }).sort((a,b)=>b.sale_date.localeCompare(a.sale_date));

  let totalIngresos=0, totalMargen=0;

  const combos = getCombos();
  const rows = filtered.map(s=>{
    const isCombo = !!s.combo_id;
    const combo = isCombo ? combos.find(c=>c.id===s.combo_id) : null;
    const item = !isCombo ? inv.find(i=>i.id===s.inventory_id) : null;
    let costTotal = 0;
    if(isCombo && combo){
      costTotal = (combo.items||[]).reduce((a,ci)=>{ const it=inv.find(i=>i.id===ci.inventory_id); return a+(it?calcItem(it,tc).total:0); },0);
    } else if(item){
      costTotal = calcItem(item,tc).total;
    }
    const spUSD = parseFloat(s.sale_price_usd)||0;
    const margin = spUSD - costTotal;
    const marginPct = costTotal>0 ? (margin/costTotal*100) : null;
    const mc = colorMargin(marginPct);
    totalIngresos += spUSD;
    totalMargen += margin;
    const prodCell = isCombo
      ? `<span class="badge" style="background:#7c3aed22;color:#a78bfa;font-size:10px;margin-right:4px">COMBO</span>${combo?esc(combo.name):'—'}`
      : (s.inventory_id||'—');
    const descCell = isCombo
      ? (combo?(combo.items||[]).map(ci=>ci.inventory_id).join(' + '):'—')
      : (item?item.description:'—');
    return `<tr>
      <td>${s.id}</td>
      <td style="white-space:nowrap">${prodCell}</td>
      <td style="max-width:180px;white-space:normal;min-width:140px">${descCell}</td>
      <td>${fUSD(costTotal)}</td>
      <td class="text-bold">${fUSD(spUSD)}</td>
      <td>${s.sale_price_ars>0?fARS(s.sale_price_ars):'—'}</td>
      <td>${s.tc_used||'—'}</td>
      <td class="${mc}">${fUSD(margin)}</td>
      <td class="${mc}">${fPct(marginPct)}</td>
      <td>${fDate(s.sale_date)}</td>
      <td>${s.channel}</td>
      <td>${s.collected_by}</td>
      <td style="max-width:140px;white-space:normal;font-size:12px;color:var(--text-muted)">${s.notes||''}</td>
      <td>
        <div class="actions-cell">
          <button class="btn btn-secondary btn-icon btn-sm" onclick="editSale('${s.id}')">✏️</button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="deleteSale('${s.id}')">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('section-sales').innerHTML = `
    <div class="section-header">
      <h2 class="section-title">Ventas <span style="color:var(--text-muted);font-size:16px;font-weight:400">(${sales.length})</span></h2>
      <button class="btn btn-primary btn-sm" onclick="addSale()">+ Agregar</button>
    </div>
    <div class="filters">
      <select class="filter-select" onchange="salesFilter.channel=this.value;renderSales()">
        <option value="">Todos los canales</option>
        ${['MercadoLibre','Fractal','Directo','Otro'].map(c=>`<option value="${c}" ${salesFilter.channel===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>ID</th><th>Producto</th><th>Descripción</th>
          <th>Costo USD</th><th>Precio USD</th><th>Precio ARS</th><th>TC</th>
          <th>Margen USD</th><th>Margen %</th>
          <th>Fecha</th><th>Canal</th><th>Cobrado</th><th>Notas</th><th></th>
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="14" style="text-align:center;padding:40px;color:var(--text-muted)">Sin ventas</td></tr>'}</tbody>
        ${filtered.length>0?`<tfoot><tr>
          <td colspan="4">Total (${filtered.length} ventas)</td>
          <td>${fUSD(totalIngresos)}</td><td></td><td></td>
          <td class="${totalMargen<0?'text-red':'text-green'}">${fUSD(totalMargen)}</td>
          <td colspan="6"></td>
        </tr></tfoot>`:''}
      </table>
    </div>
  `;
}

function addSale(){
  openPanel('Nueva Venta', buildSaleForm(null), (data)=>{
    const sales = getSales();
    const maxN = sales.reduce((mx,s)=>{ const n=parseInt(s.id.replace('VTA-',''))||0; return Math.max(mx,n); },0);
    data.id = 'VTA-'+(maxN+1).toString().padStart(4,'0');
    sales.push(data);
    saveSales(sales);
    // Update inventory status
    if(data.combo_id){
      const combo = getCombos().find(c=>c.id===data.combo_id);
      if(combo){
        const inv = getInventory();
        (combo.items||[]).forEach(ci=>{
          const idx = inv.findIndex(i=>i.id===ci.inventory_id);
          if(idx>=0) inv[idx].status='Vendido';
        });
        saveInventory(inv);
      }
    } else if(data.inventory_id){
      const inv = getInventory();
      const idx = inv.findIndex(i=>i.id===data.inventory_id);
      if(idx>=0){ inv[idx].status='Vendido'; if(data.sale_price_usd) inv[idx].sale_price_usd=data.sale_price_usd; if(data.sale_price_ars) inv[idx].sale_price_ars=data.sale_price_ars; if(data.collected_by) inv[idx].collected_by=data.collected_by; saveInventory(inv); }
    }
    renderSales();
    closePanel();
  });
}

function editSale(id){
  const sales = getSales();
  const s = sales.find(x=>x.id===id);
  if(!s) return;
  openPanel('Editar Venta: '+s.id, buildSaleForm(s), (data)=>{
    const idx = sales.findIndex(x=>x.id===id);
    sales[idx] = {...s,...data,id:s.id};
    saveSales(sales);
    renderSales();
    closePanel();
  });
}

function deleteSale(id){
  confirmDelete(()=>{
    const sale = getSales().find(s=>s.id===id);
    if(sale && sale.combo_id){
      const combo = getCombos().find(c=>c.id===sale.combo_id);
      if(combo){
        const inv = getInventory();
        (combo.items||[]).forEach(ci=>{
          const idx = inv.findIndex(i=>i.id===ci.inventory_id);
          if(idx>=0 && inv[idx].status==='Vendido') inv[idx].status='En Stock';
        });
        saveInventory(inv);
      }
    }
    addTombstone(id);
    saveSales(getSales().filter(s=>s.id!==id));
    renderSales();
  });
}

  const initComboDesc = isCombo && v.combo_id ? (()=>{const c=combos.find(x=>x.id===v.combo_id);return c?c.name:'';})() : '';
  const initComboCosto = isCombo && v.combo_id ? (()=>{const c=combos.find(x=>x.id===v.combo_id);if(!c)return'';const cost=(c.items||[]).reduce((a,ci)=>{const it=allInv.find(i=>i.id===ci.inventory_id);return a+(it?calcItem(it,tc).total:0);},0);return fUSD(cost);})() : '';

  return `

      <label class="form-label">Tipo de venta</label>
      <div style="display:flex;gap:8px">
        <button type="button" id="btn_type_ind" class="btn btn-sm ${!isCombo?'btn-primary':'btn-secondary'}" onclick="setSaleType('individual')">Producto individual</button>
        <button type="button" id="btn_type_combo" class="btn btn-sm ${isCombo?'btn-primary':'btn-secondary'}" onclick="setSaleType('combo')">Combo</button>
      </div>
    </div>
    <div id="sale_individual_block" style="display:${isCombo?'none':'block'}">
      <div class="form-group">
        <label class="form-label">Producto *</label>
        <select class="form-control" id="f_inv_id" onchange="onSaleInvChange()">
          <option value="">Seleccionar…</option>
          ${inv.map(i=>`<option value="${i.id}" ${v.inventory_id===i.id?'selected':''}>${i.id} — ${i.description}</option>`).join('')}
        </select>
      </div>
      <div class="form-group readonly">
        <label class="form-label">Descripción (auto)</label>
        <input class="form-control" id="f_inv_desc" readonly value="${initDesc}">
      </div>
      <div class="form-group readonly">
        <label class="form-label">Costo Total USD (auto)</label>
        <input class="form-control" id="f_costo" readonly value="${initCosto}">
      </div>
    </div>
    <div id="sale_combo_block" style="display:${isCombo?'block':'none'}">
      <div class="form-group">
        <label class="form-label">Combo *</label>
        <select class="form-control" id="f_combo_id" onchange="onSaleComboChange()">
          <option value="">Seleccionar combo…</option>
          ${combos.map(c=>`<option value="${c.id}" ${v.combo_id===c.id?'selected':''}>${c.id} — ${esc(c.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group readonly">
        <label class="form-label">Componentes (auto)</label>
        <input class="form-control" id="f_combo_desc" readonly value="${initComboDesc}">
      </div>
      <div class="form-group readonly">
        <label class="form-label">Costo Total USD (auto)</label>
        <input class="form-control" id="f_costo" readonly value="${initComboCosto}">
      </div>
    </div>
    <div class="form-section-title">Precio de Venta</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Precio USD</label>
        <input class="form-control" id="f_sp_usd" type="number" step="0.01" value="${v.sale_price_usd||''}" placeholder="0.00">
      </div>
      <div class="form-group">
        <label class="form-label">Precio ARS</label>
        <input class="form-control" id="f_sp_ars" type="number" step="1" value="${v.sale_price_ars||''}" placeholder="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">TC Usado</label>
        <input class="form-control" id="f_tc" type="number" step="0.01" value="${v.tc_used||currentTC}" placeholder="${currentTC}">
      </div>
      <div class="form-group">
        <label class="form-label">Fecha Venta</label>
        <input class="form-control" id="f_date" type="date" value="${v.sale_date||new Date().toISOString().split('T')[0]}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Canal</label>
        <select class="form-control" id="f_channel">
          ${['MercadoLibre','Fractal','Directo','Otro'].map(c=>`<option value="${c}" ${v.channel===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Cobrado por</label>
        <select class="form-control" id="f_cob" onchange="toggleCobroSplit()">
          <option value="Frank" ${v.collected_by==='Frank'?'selected':''}>Frank</option>
          <option value="Santi" ${v.collected_by==='Santi'?'selected':''}>Santi</option>
          <option value="Ambos" ${v.collected_by==='Ambos'?'selected':''}>Ambos</option>
        </select>
      </div>
    </div>
    <div id="cobro_split" style="display:${v.collected_by==='Ambos'?'block':'none'}">
      <div class="form-row">

          <label class="form-label">Frank cobró USD</label>
          <input class="form-control" id="f_frank_cob" type="number" step="0.01" value="${v.frank_collected_usd||0}">
        </div>
        <div class="form-group">
          <label class="form-label">Santi cobró USD</label>
          <input class="form-control" id="f_santi_cob" type="number" step="0.01" value="${v.santi_collected_usd||0}">

function toggleCobroSplit(){
  const cob = document.getElementById('f_cob');
  const split = document.getElementById('cobro_split');
  if(cob && split) split.style.display = cob.value==='Ambos' ? 'block' : 'none';
}

function setSaleType(type){
  const isCombo = type === 'combo';
  document.getElementById('sale_individual_block').style.display = isCombo ? 'none' : 'block';
  document.getElementById('sale_combo_block').style.display = isCombo ? 'block' : 'none';
  document.getElementById('btn_type_ind').className = 'btn btn-sm ' + (isCombo ? 'btn-secondary' : 'btn-primary');
  document.getElementById('btn_type_combo').className = 'btn btn-sm ' + (isCombo ? 'btn-primary' : 'btn-secondary');
}

function onSaleInvChange(){
  const id = document.getElementById('f_inv_id').value;
  const item = getInventory().find(i=>i.id===id);
  if(item){
    document.getElementById('f_inv_desc').value = item.description;
    document.getElementById('f_costo').value = fUSD(calcItem(item,currentTC).total);
  } else {
    document.getElementById('f_inv_desc').value = '';
    document.getElementById('f_costo').value = '';
  }
}

function onSaleComboChange(){
  const id = document.getElementById('f_combo_id').value;
  const combo = getCombos().find(c=>c.id===id);
  const inv = getInventory();
  const tc = currentTC;
  if(combo){
    document.getElementById('f_combo_desc').value = combo.name || '';
    const cost = (combo.items||[]).reduce((a,ci)=>{ const it=inv.find(i=>i.id===ci.inventory_id); return a+(it?calcItem(it,tc).total:0); }, 0);
    document.getElementById('f_costo').value = fUSD(cost);
    const priceEl = document.getElementById('f_sp_usd');
    if(priceEl && !priceEl.value) priceEl.value = combo.combo_price_usd||'';
  } else {
    document.getElementById('f_combo_desc').value = '';
    document.getElementById('f_costo').value = '';
  }
}

function collectSaleForm(){
  const cob = document.getElementById('f_cob').value;
  const sp = parseFloat(document.getElementById('f_sp_usd').value)||0;
  let frank_collected_usd, santi_collected_usd;
  if(cob==='Frank'){ frank_collected_usd=sp; santi_collected_usd=0; }
  else if(cob==='Santi'){ frank_collected_usd=0; santi_collected_usd=sp; }
  else { frank_collected_usd=parseFloat(document.getElementById('f_frank_cob').value)||0; santi_collected_usd=parseFloat(document.getElementById('f_santi_cob').value)||0; }
  const comboBlock = document.getElementById('sale_combo_block');
  const isComboSale = comboBlock && comboBlock.style.display !== 'none';
  const comboIdEl = document.getElementById('f_combo_id');
  const invIdEl = document.getElementById('f_inv_id');
  return {
    inventory_id: (!isComboSale && invIdEl) ? (invIdEl.value||null) : null,
    combo_id: (isComboSale && comboIdEl) ? (comboIdEl.value||null) : null,
    sale_price_usd: sp,
    sale_price_ars: parseFloat(document.getElementById('f_sp_ars').value)||0,
    tc_used: parseFloat(document.getElementById('f_tc').value)||currentTC,
    sale_date: document.getElementById('f_date').value,
    channel: document.getElementById('f_channel').value,
    collected_by: cob,
    frank_collected_usd,
    santi_collected_usd,
    notes: document.getElementById('f_notes').value.trim(),
  };
}

// ─── EXPENSES ─────────────────────────────────────────────────────────────────
function renderExpenses(){
  const exp = getExpenses();
  const tc = currentTC;
  const cats = ['IT','Courier','Pauta','CM','Varios'];

  let filtered = exp.filter(e=>{
    if(expFilter.category && e.category!==expFilter.category) return false;
    if(expFilter.paid_by && e.paid_by!==expFilter.paid_by) return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  const catTotals = {};
  cats.forEach(c=>catTotals[c]=0);
  let totalEquiv=0;
  exp.forEach(e=>{ catTotals[e.category]=(catTotals[e.category]||0)+calcExpEquiv(e,tc); totalEquiv+=calcExpEquiv(e,tc); });

  let filteredTotal=0;
  const rows = filtered.map(e=>{
    const equiv = calcExpEquiv(e,tc);
    filteredTotal += equiv;
    return `<tr>
      <td style="max-width:200px;white-space:normal;min-width:140px">${e.description}</td>
      <td><span class="badge badge-accent">${e.category}</span></td>
      <td>${e.amount_usd>0?fUSD(e.amount_usd):'—'}</td>
      <td>${e.amount_ars>0?fARS(e.amount_ars):'—'}</td>
      <td class="text-bold">${equiv>0?fUSD(equiv):'—'}</td>
      <td>${fDate(e.date)}</td>
      <td>${e.paid_by}</td>
      <td style="max-width:140px;white-space:normal;font-size:12px;color:var(--text-muted)">${e.notes||''}</td>
      <td>
        <div class="actions-cell">
          <button class="btn btn-secondary btn-icon btn-sm" onclick="editExpense('${e.id}')">✏️</button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="deleteExpense('${e.id}')">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('section-expenses').innerHTML = `
    <div class="section-header">
      <h2 class="section-title">Gastos</h2>
      <button class="btn btn-primary btn-sm" onclick="addExpense()">+ Agregar</button>
    </div>
    <div class="grid-4" style="margin-bottom:20px">
      ${cats.map(c=>`<div class="card card-sm">
        <div class="card-title">${c}</div>
        <div class="card-value" style="font-size:20px">${fUSD(catTotals[c])}</div>
      </div>`).join('')}
    </div>
    <div class="filters">
      <select class="filter-select" onchange="expFilter.category=this.value;renderExpenses()">
        <option value="">Todas las categorías</option>
        ${cats.map(c=>`<option value="${c}" ${expFilter.category===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="expFilter.paid_by=this.value;renderExpenses()">
        <option value="">Todos los socios</option>
        ${['Frank','Santi','Ambos'].map(p=>`<option value="${p}" ${expFilter.paid_by===p?'selected':''}>${p}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Descripción</th><th>Categoría</th>
          <th>Monto USD</th><th>Monto ARS</th><th>Equiv. USD</th>
          <th>Fecha</th><th>Pagado por</th><th>Notas</th><th></th>
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted)">Sin gastos</td></tr>'}</tbody>
        ${filtered.length>0?`<tfoot><tr>
          <td>Total (${filtered.length} registros)</td><td></td><td></td><td></td>
          <td>${fUSD(filteredTotal)}</td>
          <td colspan="4"></td>
        </tr></tfoot>`:''}
      </table>
    </div>
  `;
}

function addExpense(){
  openPanel('Agregar Gasto', buildExpenseForm(null), (data)=>{
    const exp = getExpenses();
    const maxN = exp.reduce((mx,e)=>{ const n=parseInt(e.id.replace('EXP-',''))||0; return Math.max(mx,n); },0);
    data.id = 'EXP-'+(maxN+1).toString().padStart(4,'0');
    exp.push(data);
    saveExpenses(exp);
    renderExpenses();
    closePanel();
  });
}

function editExpense(id){
  const exp = getExpenses();
  const e = exp.find(x=>x.id===id);
  if(!e) return;
  openPanel('Editar Gasto', buildExpenseForm(e), (data)=>{
    const idx = exp.findIndex(x=>x.id===id);

async function refreshTC(){
  const btn = event.target;
  btn.textContent = 'Actualizando…';
  btn.disabled = true;
  const ok = await fetchTC();
  btn.textContent = ok ? '✓ Actualizado' : '✗ Error';

function exportJSON(){
  const data = {
    inventory: getInventory(),
    sales: getSales(),
    expenses: getExpenses(),
    partners: getPartners(),
    senas: getSenas(),
    settings: getSettings(),
    exported_at: new Date().toISOString()
  };
  dlFile('amplify-backup-'+new Date().toISOString().split('T')[0]+'.json', JSON.stringify(data,null,2), 'application/json');
}

function importJSON(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const data = JSON.parse(e.target.result);
      if(!confirm('¿Importar datos? Esto reemplazará todos los registros actuales.')) return;
      if(data.inventory) saveInventory(data.inventory);
      if(data.sales) saveSales(data.sales);
      if(data.expenses) saveExpenses(data.expenses);
      if(data.partners) savePartners(data.partners);
      if(data.senas) saveSenas(data.senas);
      if(data.settings) saveSettings(data.settings);
      updateTCDisplay();
      renderCurrentSection();
      alert('Datos importados correctamente.');
    }catch(err){
      alert('Error al leer el archivo JSON.');
    }
  };
  reader.readAsText(file);
}

function resetAll(){
  if(!confirm('¿Eliminar TODOS los datos? Esta acción es irreversible.')) return;
  if(!confirm('Segunda confirmación: ¿Estás seguro? Se perderán todos los registros.')) return;
  [K.inv,K.sales,K.exp,K.partners,K.settings,K.init,K.senas,K.combos,K.tombs,'amp_mig_v1','amp_mig_v2','amp_mig_v3'].forEach(k=>localStorage.removeItem(k));
  initApp();
}

// ─── PANEL ────────────────────────────────────────────────────────────────────
let currentFormSection = null;

function openPanel(title, bodyHTML, callback){
  document.getElementById('panelTitle').textContent = title;
  document.getElementById('panelBody').innerHTML = bodyHTML;
  document.getElementById('panelFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closePanel()">Cancelar</button>
    <button class="btn btn-primary" onclick="submitPanel()">Guardar</button>
  `;
  panelCallback = callback;
  // figure out section from title
  if(title.includes('Producto')) currentFormSection='inventory';
  else if(title.startsWith('Completar seña')) currentFormSection='complete-sena';
  else if(title.includes('Seña') || title.startsWith('SEN-')) currentFormSection='senas';
  else if(title.startsWith('Vender Combo')) currentFormSection='combo-sale';
  else if(title.startsWith('Nuevo Combo') || title.startsWith('Editar Combo')) currentFormSection='combo';
  else if(title.includes('Venta')) currentFormSection='sales';
  else if(title.includes('Gasto')) currentFormSection='expenses';
  else if(title.includes('Movimiento')) currentFormSection='partners';
  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('slidePanel').classList.add('open');
}

function closePanel(){
  document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('slidePanel').classList.remove('open');
  panelCallback = null;
}

function submitPanel(){
  let data;
  if(currentFormSection==='inventory') data = collectInventoryForm();
  else if(currentFormSection==='combo') data = collectComboForm();
  else if(currentFormSection==='sales'||currentFormSection==='combo-sale') data = collectSaleForm();
  else if(currentFormSection==='expenses') data = collectExpenseForm();
  else if(currentFormSection==='partners') data = collectMovementForm();
  else if(currentFormSection==='senas') data = collectSenaForm();
  else if(currentFormSection==='complete-sena') data = collectCompleteSenaForm();
  if(data && panelCallback) panelCallback(data);
}

function confirmDelete(callback){
  deleteCallback = callback;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  deleteCallback = null;

document.getElementById('modalConfirmBtn').addEventListener('click', ()=>{

document.getElementById('modalOverlay').addEventListener('click', e=>{
