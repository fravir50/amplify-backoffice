  `).join('');

  return `
    <div class="form-section-title">Cliente</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nombre *</label>
        <input class="form-control" id="f_cust_name" type="text" value="${esc(v.customer_name||'')}" placeholder="Nombre del cliente">
      </div>
      <div class="form-group">
        <label class="form-label">Contacto</label>
        <input class="form-control" id="f_cust_contact" type="text" value="${esc(v.customer_contact||'')}" placeholder="WhatsApp / mail">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Fecha de seña</label>
        <input class="form-control" id="f_date" type="date" value="${v.date||new Date().toISOString().split('T')[0]}">
      </div>
      <div class="form-group">
        <label class="form-label">Cobrado por</label>
        <select class="form-control" id="f_cob">
          ${['Frank','Santi','Ambos'].map(p=>`<option value="${p}" ${v.collected_by===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="form-section-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>Productos del deal</span>
      <button class="btn btn-secondary btn-sm" onclick="addSenaLine()" type="button">+ Agregar</button>
    </div>
    <div id="sena-product-lines">${productLines}</div>

    <div class="form-section-title">Seña y Total</div>
    <div class="sena-totals" id="sena-totals">
      <div class="sena-totals-row"><span class="text-secondary">Total deal</span><span id="st-total">—</span></div>
      <div class="sena-totals-row"><span class="text-secondary">Seña cobrada</span><span id="st-sena">—</span></div>
      <div class="sena-totals-row total"><span>Saldo pendiente</span><span id="st-saldo" class="text-yellow">—</span></div>
    </div>
    <div class="form-group" style="margin-top:12px">
      <label class="form-label">Monto señado USD *</label>
      <input class="form-control" id="f_sena" type="number" step="0.01" value="${v.sena_amount_usd||''}" placeholder="0.00" oninput="updateSenaTotals()">
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <textarea class="form-control" id="f_notes" rows="2">${esc(v.notes||'')}</textarea>
    </div>
    <script>
      (function(){ updateSenaTotals(); })();
    <\/script>
  `;
}

let senaLineCount = 0;
function addSenaLine(){
  senaLineCount++;
  const i = Date.now();
  const inv = getInventory().filter(x=>x.status==='En Stock'||x.status==='Reservado'||x.status==='En Pedido');
  const cats = ['Headphones','Streamer','Amplificador','Tocadiscos','DAC','Speakers'];
  const div = document.createElement('div');
  div.className = 'sena-product-line';
  div.id = 'pline-'+i;
  div.innerHTML = `
    <div class="product-select">
      <select class="form-control" id="p_inv_${i}" onchange="onSenaInvChange(${i})" style="margin-bottom:6px">
        <option value="">Seleccionar producto…</option>
        <option value="__new__">➕ Nuevo producto (En Pedido)</option>
        ${inv.map(it=>`<option value="${it.id}">${it.id} — ${it.description}</option>`).join('')}
      </select>
      <div id="p_new_fields_${i}" style="display:none">
        <div class="sena-new-product-fields">
          <div class="form-row" style="margin-bottom:8px">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Descripción</label>
              <input class="form-control" id="p_new_desc_${i}" type="text" placeholder="Ej: Marantz CD6007">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Categoría</label>
              <select class="form-control" id="p_new_cat_${i}">
                ${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Costo estimado USD</label>
            <input class="form-control" id="p_new_cost_${i}" type="number" step="0.01" placeholder="0.00">
          </div>
        </div>
      </div>
    </div>
    <div class="price-input">
      <label class="form-label">Precio USD</label>
      <input class="form-control" id="p_price_${i}" type="number" step="0.01" placeholder="0.00" oninput="updateSenaTotals()">
    </div>
    <button class="btn btn-ghost remove-btn" onclick="this.closest('.sena-product-line').remove();updateSenaTotals()" title="Quitar">✕</button>
  `;
  document.getElementById('sena-product-lines').appendChild(div);
}

function removeSenaLine(i){
  const el = document.getElementById('pline-'+i);
  if(el) el.remove();
  updateSenaTotals();
}

function onSenaInvChange(i){
  const sel = document.getElementById('p_inv_'+i);
  const newFields = document.getElementById('p_new_fields_'+i);
  if(!sel||!newFields) return;
  newFields.style.display = sel.value==='__new__' ? 'block' : 'none';
}

function updateSenaTotals(){
  const lines = document.querySelectorAll('#sena-product-lines .sena-product-line');
  let total = 0;
  lines.forEach(line=>{
    const priceInput = line.querySelector('[id^="p_price_"]');
    if(priceInput) total += parseFloat(priceInput.value)||0;
  });
  const senaInput = document.getElementById('f_sena');
  const sena = senaInput ? parseFloat(senaInput.value)||0 : 0;
  const saldo = total - sena;
  const tEl=document.getElementById('st-total'), sEl=document.getElementById('st-sena'), slEl=document.getElementById('st-saldo');
  if(tEl) tEl.textContent = fUSD(total);
  if(sEl) sEl.textContent = fUSD(sena);
  if(slEl){ slEl.textContent = fUSD(saldo); slEl.className = saldo>0?'text-yellow':'text-green'; }
}

function collectSenaForm(){
  const lines = document.querySelectorAll('#sena-product-lines .sena-product-line');
  const products = [];
  lines.forEach(line=>{
    const invSel = line.querySelector('[id^="p_inv_"]');
    const priceSel = line.querySelector('[id^="p_price_"]');
    if(!invSel||!priceSel) return;
    const invId = invSel.value;
    const price = parseFloat(priceSel.value)||0;
    if(!invId) return;
    if(invId==='__new__'){
      const descEl = line.querySelector('[id^="p_new_desc_"]');
      const catEl = line.querySelector('[id^="p_new_cat_"]');
      const costEl = line.querySelector('[id^="p_new_cost_"]');
      products.push({
        inventory_id:'__new__',
        description: descEl?descEl.value.trim():'',
        new_description: descEl?descEl.value.trim():'',
        new_category: catEl?catEl.value:'',
        new_cost: costEl?parseFloat(costEl.value)||0:0,
        agreed_price_usd: price,
      });
    } else {
      const item = getInventory().find(i=>i.id===invId);
      products.push({inventory_id:invId, description:item?item.description:invId, agreed_price_usd:price});
    }
  });
  return {
    customer_name: document.getElementById('f_cust_name').value.trim(),
    customer_contact: document.getElementById('f_cust_contact').value.trim(),
    date: document.getElementById('f_date').value,
    collected_by: document.getElementById('f_cob').value,
    products,
    sena_amount_usd: parseFloat(document.getElementById('f_sena').value)||0,
    notes: document.getElementById('f_notes').value.trim(),
  };
}

function buildCompleteSenaPanel(s){
  const inv = getInventory();
  const total = (s.products||[]).reduce((t,p)=>t+(parseFloat(p.agreed_price_usd)||0),0);
  const saldo = total - (parseFloat(s.sena_amount_usd)||0);
  const productList = (s.products||[]).map(p=>{
    const it = inv.find(i=>i.id===p.inventory_id);
    return `<div class="recent-item">
      <span style="font-size:13px">${it?it.description:p.description}</span>
      <span class="text-bold">${fUSD(p.agreed_price_usd)}</span>
    </div>`;
  }).join('');
  return `
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">Cliente</div>
      <div style="font-weight:600">${esc(s.customer_name)}</div>
      ${s.customer_contact?`<div style="font-size:12px;color:var(--text-muted)">${esc(s.customer_contact)}</div>`:''}
    </div>
    <div class="form-section-title">Productos</div>
    ${productList}
    <div class="sena-totals" style="margin-top:12px;margin-bottom:20px">
      <div class="sena-totals-row"><span class="text-secondary">Total pactado</span><span class="text-bold">${fUSD(total)}</span></div>
      <div class="sena-totals-row"><span class="text-secondary">Ya cobrado (seña)</span><span class="text-accent">${fUSD(s.sena_amount_usd)}</span></div>
      <div class="sena-totals-row total"><span>Saldo a cobrar</span><span class="text-yellow">${fUSD(saldo)}</span></div>
    </div>
    <div class="form-section-title">Cierre</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Fecha de cierre</label>
        <input class="form-control" id="fc_date" type="date" value="${new Date().toISOString().split('T')[0]}">
      </div>
      <div class="form-group">
        <label class="form-label">TC Usado</label>
        <input class="form-control" id="fc_tc" type="number" step="0.01" value="${currentTC}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Canal de venta</label>
        <select class="form-control" id="fc_channel">
          ${['Directo','MercadoLibre','Fractal','Otro'].map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Cobrado por</label>
        <select class="form-control" id="fc_cob">
          ${['Frank','Santi','Ambos'].map(p=>`<option value="${p}" ${s.collected_by===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-hint" style="margin-top:4px">Al confirmar se crearán ${(s.products||[]).length} venta${(s.products||[]).length!==1?'s':''} y los productos quedarán como Vendido.</div>
  `;
}

function collectCompleteSenaForm(){
  return {
    completed_date: document.getElementById('fc_date').value,
    tc_used: parseFloat(document.getElementById('fc_tc').value)||currentTC,
    channel: document.getElementById('fc_channel').value,
    collected_by: document.getElementById('fc_cob').value,
  };
}

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function dlFile(filename, content, type){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = filename;
  a.click();
}

// ─── THEME ────────────────────────────────────────────────────────────────────
function applyTheme(theme){
  const isLight = theme === 'light';
  if(isLight){
    document.documentElement.setAttribute('data-theme','light');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  document.getElementById('themeIcon').textContent = isLight ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = isLight ? 'Modo oscuro' : 'Modo claro';
  document.getElementById('toggleTrack').classList.toggle('on', isLight);
  document.getElementById('toggleThumb').classList.toggle('on', isLight);
  localStorage.setItem('amp_theme', theme);
}

function toggleTheme(){
  const current = localStorage.getItem('amp_theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

function initTheme(){
  applyTheme(localStorage.getItem('amp_theme') || 'dark');
}

// ─── MIGRATIONS ───────────────────────────────────────────────────────────────
function runMigrations(){
  if(localStorage.getItem('amp_mig_v1')) return;

  // a) Fix tax_usd: restar cost_usd donde tax_usd > cost_usd
  const inv = getInventory();
  let invChanged = false;
  inv.forEach(item => {
    if((parseFloat(item.tax_usd)||0) > (parseFloat(item.cost_usd)||0)){
      item.tax_usd = parseFloat((item.tax_usd - item.cost_usd).toFixed(2));
      invChanged = true;
    }
  });
  if(invChanged) saveInventory(inv);

  // b) Agregar frank/santi_collected_usd a ventas existentes
  const sales = getSales();
  let salesChanged = false;
  sales.forEach(s => {
    if(!('frank_collected_usd' in s)){
      const sp = parseFloat(s.sale_price_usd)||0;
      if(s.collected_by==='Frank'){ s.frank_collected_usd=sp; s.santi_collected_usd=0; }
      else if(s.collected_by==='Santi'){ s.frank_collected_usd=0; s.santi_collected_usd=sp; }
      else { s.frank_collected_usd=0; s.santi_collected_usd=0; }
      salesChanged = true;
    }
  });
  if(salesChanged) saveSales(sales);

  // c) Agregar type='compra' a movimientos existentes
  const movs = getPartners();
  let movsChanged = false;
  movs.forEach(m => { if(!m.type){ m.type='compra'; movsChanged=true; } });
  if(movsChanged) savePartners(movs);

  localStorage.setItem('amp_mig_v1','1');
}

function runMigrationsV2(){
  if(localStorage.getItem('amp_mig_v2')) return;
  // Remove VTA-0001 (deleted by user; sync kept restoring it from cloud)
  const sales = getSales();
  const cleaned = sales.filter(s=>s.id!=='VTA-0001');
  if(cleaned.length !== sales.length) saveSales(cleaned);
  localStorage.setItem('amp_mig_v2','1');
}

function runMigrationsV3(){
  if(localStorage.getItem('amp_mig_v3')) return;
  // Eliminar gastos de categoría 'Productos' — ya están duplicados en Compras
  const exp = getExpenses().filter(e=>e.category!=='Productos');
  saveExpenses(exp);
  localStorage.setItem('amp_mig_v3','1');
}

function runMigrationsV4(){
  if(localStorage.getItem('amp_mig_v4')) return;
  // Add arrived_arg field to inventory items
  const invData = getInventory();
  invData.forEach(item=>{ if(item.arrived_arg===undefined) item.arrived_arg=''; });
  saveInventory(invData);
  localStorage.setItem('amp_mig_v4','1');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function initApp(){
  initTheme();
  await syncFromCloud();
  runMigrations();
  runMigrationsV2();
  runMigrationsV3();
  runMigrationsV4();
  if(!localStorage.getItem(K.init)){
    saveInventory(INIT_INVENTORY);
    saveSales(INIT_SALES);
    saveExpenses(INIT_EXPENSES);
    savePartners(INIT_PARTNERS);
    saveCombos([]);
    save(K.init,'1');
    // set a reasonable default TC
    const s = getSettings();
    if(!s.tc){ s.tc=1000; saveSettings(s); }
  }
  updateTCDisplay();
  renderDashboard();
  // fetch TC in background
  fetchTC(true).then(()=>{ if(currentSection==='dashboard') renderDashboard(); });
}

// Keyboard: close panel with Escape
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closePanel(); closeModal(); } });

initApp();
</script>
