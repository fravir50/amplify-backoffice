function addSena(){
  openPanel('Nueva Seña', buildSenaForm(null), (data)=>{
    const senas = getSenas();
    const maxN = senas.reduce((mx,s)=>{ const n=parseInt(s.id.replace('SEN-',''))||0; return Math.max(mx,n); },0);
    data.id = 'SEN-'+(maxN+1).toString().padStart(4,'0');
    data.status = 'Activa';
    data.sale_ids = [];
    data.completed_date = null;
    // Process products: reserve in-stock items, create En Pedido items
    const inv = getInventory();
    const processedProducts = [];
    (data.products||[]).forEach(p=>{
      if(p.inventory_id && p.inventory_id !== '__new__'){
        const idx = inv.findIndex(i=>i.id===p.inventory_id);
        if(idx>=0 && inv[idx].status==='En Stock'){
          inv[idx].status = 'Reservado';
        }
        processedProducts.push({inventory_id:p.inventory_id, description:p.description, agreed_price_usd:p.agreed_price_usd});
      } else if(p.inventory_id === '__new__' && p.new_description){
        // Create new inventory item as En Pedido
        const maxInv = inv.reduce((mx,i)=>{ const n=parseInt(i.id.replace('AMP-',''))||0; return Math.max(mx,n); },0);
        const newId = 'AMP-'+(maxInv+1).toString().padStart(4,'0');
        inv.push({
          id: newId,
          description: p.new_description,
          category: p.new_category||'Varios',
          cost_usd: parseFloat(p.new_cost)||0,
          tax_usd: 0,
          purchase_date: data.date,
          status: 'En Pedido',
          sale_price_usd: parseFloat(p.agreed_price_usd)||0,
          sale_price_ars: 0,
          collected_by: data.collected_by||'',
          notes: 'Creado desde seña '+data.id,
        });
        processedProducts.push({inventory_id:newId, description:p.new_description, agreed_price_usd:p.agreed_price_usd});
      }
    });
    data.products = processedProducts;
    saveInventory(inv);
    senas.push(data);
    saveSenas(senas);
    renderSenas();
    closePanel();
  });
}

function editSena(id){
  const senas = getSenas();
  const s = senas.find(x=>x.id===id);
  if(!s) return;
  openPanel(s.id+' — Editar', buildSenaForm(s), (data)=>{
    const idx = senas.findIndex(x=>x.id===id);
    senas[idx] = {...s, ...data, id:s.id, status:s.status, sale_ids:s.sale_ids, completed_date:s.completed_date};
    saveSenas(senas);
    renderSenas();
    closePanel();
  });
}

function cancelSena(id){
  if(!confirm('¿Cancelar esta seña? Los productos reservados volverán a "En Stock".')) return;
  const senas = getSenas();
  const s = senas.find(x=>x.id===id);
  if(!s) return;
  // Revert reservado items back to en stock
  const inv = getInventory();
  (s.products||[]).forEach(p=>{
    const idx = inv.findIndex(i=>i.id===p.inventory_id);
    if(idx>=0 && inv[idx].status==='Reservado') inv[idx].status='En Stock';
  });
  saveInventory(inv);
  const idx = senas.findIndex(x=>x.id===id);
  senas[idx].status = 'Cancelada';
  saveSenas(senas);
  renderSenas();
}

function deleteSena(id){
  confirmDelete(()=>{
    addTombstone(id);
    saveSenas(getSenas().filter(s=>s.id!==id));
    renderSenas();
  });
}

function completeSena(id){
  const senas = getSenas();
  const s = senas.find(x=>x.id===id);
  if(!s) return;
  openPanel('Completar seña: '+id, buildCompleteSenaPanel(s), (data)=>{
    const inv = getInventory();
    const salesArr = getSales();
    const maxN = salesArr.reduce((mx,x)=>{ const n=parseInt(x.id.replace('VTA-',''))||0; return Math.max(mx,n); },0);
    const newSaleIds = [];
    let counter = maxN;
    (s.products||[]).forEach((p,i)=>{
      counter++;
      const saleId = 'VTA-'+counter.toString().padStart(4,'0');
      salesArr.push({
        id: saleId,
        inventory_id: p.inventory_id,
        sale_price_usd: parseFloat(p.agreed_price_usd)||0,
        sale_price_ars: 0,
        tc_used: parseFloat(data.tc_used)||currentTC,
        sale_date: data.completed_date,
        channel: data.channel,
        collected_by: data.collected_by,
        notes: 'Generado desde seña '+id+(s.notes?' — '+s.notes:''),
      });
      newSaleIds.push(saleId);
      const invIdx = inv.findIndex(x=>x.id===p.inventory_id);
      if(invIdx>=0){ inv[invIdx].status='Vendido'; inv[invIdx].collected_by=data.collected_by; }
    });
    saveInventory(inv);
    saveSales(salesArr);
    const senaIdx = senas.findIndex(x=>x.id===id);
    senas[senaIdx].status = 'Completada';
    senas[senaIdx].completed_date = data.completed_date;
    senas[senaIdx].sale_ids = newSaleIds;
    saveSenas(senas);
    renderSenas();
    closePanel();
    alert(`✓ Seña completada. Se generaron ${newSaleIds.length} venta${newSaleIds.length!==1?'s':''}: ${newSaleIds.join(', ')}`);
  });
}

function updateSenaTotals(){
  const lines = document.querySelectorAll('#sena-product-lines .sena-product-line');
  let total = 0;
  lines.forEach(line=>{
    const priceInput = line.querySelector('[id^="p_price_"]');
    if(priceInput) total += parseFloat(priceInput.value)||0;
  });
  const senaInput = document.getElementById('f_sena');
  const sena = senaInput ? parseFloat(senaInput.value)||0 : 0;
  const saldo = total - sena;
  const tEl=document.getElementById('st-total'), sEl=document.getElementById('st-sena'), slEl=document.getElementById('st-saldo');
  if(tEl) tEl.textContent = fUSD(total);
  if(sEl) sEl.textContent = fUSD(sena);
  if(slEl){ slEl.textContent = fUSD(saldo); slEl.className = saldo>0?'text-yellow':'text-green'; }
}

    if(!invSel||!priceSel) return;
    const invId = invSel.value;

    if(!invId) return;
    if(invId==='__new__'){
      const descEl = line.querySelector('[id^="p_new_desc_"]');

    document.documentElement.removeAttribute('data-theme');

// ─── MIGRATIONS ───────────────────────────────────────────────────────────────
function runMigrations(){
  if(localStorage.getItem('amp_mig_v1')) return;

  // a) Fix tax_usd: restar cost_usd donde tax_usd > cost_usd
  const inv = getInventory();
  let invChanged = false;
  inv.forEach(item => {
    if((parseFloat(item.tax_usd)||0) > (parseFloat(item.cost_usd)||0)){
      item.tax_usd = parseFloat((item.tax_usd - item.cost_usd).toFixed(2));
      invChanged = true;
    }
  });
  if(invChanged) saveInventory(inv);

  // b) Agregar frank/santi_collected_usd a ventas existentes
  const sales = getSales();
  let salesChanged = false;
  sales.forEach(s => {
    if(!('frank_collected_usd' in s)){
      const sp = parseFloat(s.sale_price_usd)||0;
      if(s.collected_by==='Frank'){ s.frank_collected_usd=sp; s.santi_collected_usd=0; }
      else if(s.collected_by==='Santi'){ s.frank_collected_usd=0; s.santi_collected_usd=sp; }
      else { s.frank_collected_usd=0; s.santi_collected_usd=0; }
      salesChanged = true;
    }
  });
  if(salesChanged) saveSales(sales);

  // c) Agregar type='compra' a movimientos existentes
  const movs = getPartners();
  let movsChanged = false;
  movs.forEach(m => { if(!m.type){ m.type='compra'; movsChanged=true; } });
  if(movsChanged) savePartners(movs);

  localStorage.setItem('amp_mig_v1','1');
}

function runMigrationsV2(){
  if(localStorage.getItem('amp_mig_v2')) return;
  // Remove VTA-0001 (deleted by user; sync kept restoring it from cloud)
  const sales = getSales();
  const cleaned = sales.filter(s=>s.id!=='VTA-0001');
  if(cleaned.length !== sales.length) saveSales(cleaned);
  localStorage.setItem('amp_mig_v2','1');
}

function runMigrationsV3(){
  if(localStorage.getItem('amp_mig_v3')) return;
  // Eliminar gastos de categoría 'Productos' — ya están duplicados en Compras
  const exp = getExpenses().filter(e=>e.category!=='Productos');
  saveExpenses(exp);
  localStorage.setItem('amp_mig_v3','1');
}

function runMigrationsV4(){
  if(localStorage.getItem('amp_mig_v4')) return;
  // Add arrived_arg field to inventory items
  const invData = getInventory();
  invData.forEach(item=>{ if(item.arrived_arg===undefined) item.arrived_arg=''; });
  saveInventory(invData);
  localStorage.setItem('amp_mig_v4','1');
}

function runMigrationsV5(){
  if(localStorage.getItem('amp_mig_v5')) return;
  const tc = currentTC || 1000;
  // Backfill tc_at_date en inventory
  const inv = getInventory();
  inv.forEach(i=>{ if(!i.tc_at_date){ i.tc_at_date=tc; i.tc_estimado=true; } });
  saveInventory(inv);
  // Backfill tc_at_date en partners
  const movs = getPartners();
  movs.forEach(m=>{ if(!m.tc_at_date){ m.tc_at_date=tc; m.tc_estimado=true; } });
  savePartners(movs);
  // Backfill estado y entrega_date en ventas
  const sales = getSales();
  sales.forEach(s=>{
    if(!s.estado) s.estado='entregado';
    if(!s.entrega_date) s.entrega_date=s.sale_date;
    if(!s.tc_at_date) s.tc_at_date=s.tc_used||tc;
  });
  saveSales(sales);
  localStorage.setItem('amp_mig_v5','1');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function initApp(){
  initTheme();
  await syncFromCloud();
  runMigrations();
  runMigrationsV2();
  runMigrationsV3();
  runMigrationsV4();
  runMigrationsV5();
  if(!localStorage.getItem(K.init)){
    saveInventory(INIT_INVENTORY);
    saveSales(INIT_SALES);
    saveExpenses(INIT_EXPENSES);
    savePartners(INIT_PARTNERS);
    saveCombos([]);
    save(K.init,'1');
    // set a reasonable default TC
    const s = getSettings();
    if(!s.tc){ s.tc=1000; saveSettings(s); }
  }
  updateTCDisplay();
  renderDashboard();
  // fetch TC in background
  fetchTC(true).then(()=>{ if(currentSection==='dashboard') renderDashboard(); });

  // Realtime: re-sync and re-render when another user saves
  _sb.channel('app_state_changes')
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'app_state'}, async (payload)=>{
      const k = payload.new.key;
      const v = payload.new.value;
      const ts = payload.new.updated_at;
      const localTs = localStorage.getItem(k+'_ts');
      if(localTs && localTs >= ts) return; // ya tenemos esta versión o más nueva
      localStorage.setItem(k, JSON.stringify(v));
      localStorage.setItem(k+'_ts', ts);
      renderCurrentSection();
      if(currentSection==='dashboard') renderDashboard();
    })
    .subscribe();
}

// ── Calc functions ─────────────────────────────────────────────────────────────
function calcValC1(p, s){
  const fob = parseFloat(p.fob)||0;
  const peso = parseFloat(p.peso)||0;
  const dias = parseFloat(s.dias_almacenaje_default)||1;
  const tributos       = fob * (s.c1_tributos_pct/100);
  const tasa           = fob * (s.c1_tasa_pct/100);
  const iva            = fob * (s.c1_iva_pct/100);
  const flete_intl     = peso * s.c1_flete_intl;
  const gastos_origen  = peso * s.c1_gastos_origen;
  const almacenaje     = peso * s.c1_almacenaje * dias;
  const honorarios     = s.c1_honorarios;
  const domicilio      = s.c1_domicilio;
  const costo = fob + tributos + tasa + iva + honorarios + domicilio + flete_intl + gastos_origen + almacenaje;
  return {costo, tributos, tasa, iva, flete_intl, gastos_origen, almacenaje, honorarios, domicilio};
}

function calcValC2(p, s){
  const fob = parseFloat(p.fob)||0;
  const peso = parseFloat(p.peso)||0;
  const tax  = fob * (s.c2_tax_pct/100);
  const flete = peso * s.c2_flete;
  const costo = fob + tax + flete;
  return {costo, tax, flete};
}

function calcValCosts(p, s){
  const c1 = calcValC1(p, s);
  const c2 = calcValC2(p, s);
  const canal = c1.costo <= c2.costo ? 'C1' : 'C2';
  const costo = Math.min(c1.costo, c2.costo);
  return {c1, c2, costo, canal};
}

function calcValVeredicto(p, s){
  const {c1, c2, costo, canal} = calcValCosts(p, s);
  const pc = p.precio_competencia_usd;
  let veredicto, precio_recomendado, margen_abs, margen_pct, detalle;

  if(p.override_veredicto && p.override_veredicto !== ''){
    // still compute everything, then override at end
  }

  if(pc === null || pc === undefined){
    veredicto = 'PRICING-POWER';
    precio_recomendado = costo * (1 + s.margen_sin_comp_pct/100);
    margen_abs = precio_recomendado - costo;
    margen_pct = s.margen_sin_comp_pct;
    detalle = 'Sin competencia local — libertad de pricing';
  } else if(costo >= pc){
    veredicto = 'EVITAR';
    precio_recomendado = null;
    margen_abs = pc - costo;
    margen_pct = (margen_abs / costo) * 100;
    detalle = `Costo ${fUSD(costo)} ≥ precio competencia ${fUSD(pc)}`;
  } else {
    const precio_comp = pc * (1 - s.undercut_pct/100);
    margen_abs = precio_comp - costo;
    margen_pct = (margen_abs / costo) * 100;
    precio_recomendado = precio_comp;

    const pasa_pct        = margen_pct >= s.piso_margen_pct;
    const pasa_ticketalto = margen_abs >= s.umbral_ticket_alto;
    const pasa_pisoabs    = margen_abs >= s.piso_margen_abs;
    const standalone_viable = (pasa_pct || pasa_ticketalto) && pasa_pisoabs;

    if(!standalone_viable){
      veredicto = 'COMBO-ONLY';
      detalle = `Margen abs ${fUSD(margen_abs)} / ${margen_pct.toFixed(1)}% — no pasa pisos standalone`;
    } else if(margen_pct >= s.margen_objetivo_pct){
      veredicto = 'MOTOR DE MARGEN';
      detalle = `Margen ${margen_pct.toFixed(1)}% ≥ objetivo ${s.margen_objetivo_pct}%`;
    } else {
      veredicto = 'STANDALONE';
      detalle = `Margen ${margen_pct.toFixed(1)}% — viable pero bajo objetivo`;
    }
  }

  const override = p.override_veredicto && p.override_veredicto !== '' ? p.override_veredicto : null;
  const veredicto_final = override || veredicto;

  const precio_si_match = (pc !== null && pc !== undefined) ? pc : null;
  return {veredicto: veredicto_final, veredicto_base: veredicto, override, precio_recomendado, precio_si_match, margen_abs, margen_pct, costo, canal, detalle, c1, c2};
}

function calcValSensibilidad(p, s){
  const result = {peso_breakeven: null, precio_comp_breakeven: null, canal_crossover: null};
  const pc = p.precio_competencia_usd;

  // Canal crossover weight: solve C1=C2 algebraically
  // C1_var = fob*(trib+tasa+iva)/100 + (c1_flete+c1_gastos+c1_alm*dias)*W + hono + dom
  // C2_var = fob*c2_tax/100 + c2_flete*W
  // C1=C2 => W*(c2_flete - c1_flete - c1_gastos - c1_alm*dias) = fob*(trib+tasa+iva-c2_tax)/100 + hono + dom
  const fob = parseFloat(p.fob)||0;
  const dias = parseFloat(s.dias_almacenaje_default)||1;
  const numerator = fob*((s.c1_tributos_pct+s.c1_tasa_pct+s.c1_iva_pct-s.c2_tax_pct)/100) + s.c1_honorarios + s.c1_domicilio;
  const denominator = s.c2_flete - s.c1_flete_intl - s.c1_gastos_origen - s.c1_almacenaje*dias;
  if(Math.abs(denominator) > 0.001){
    const w = numerator / denominator;
    if(w > 0) result.canal_crossover = w;
  }

  // Peso breakeven: find weight where veredicto changes (binary search [0..200])
  const verBase = calcValVeredicto(p, s).veredicto_base;
  if(verBase !== 'EVITAR' && verBase !== 'PRICING-POWER'){
    let lo=0, hi=200;
    for(let i=0;i<40;i++){
      const mid=(lo+hi)/2;
      const pTest = {...p, peso:mid};
      const v = calcValVeredicto(pTest, s).veredicto_base;
      if(v === verBase) lo=mid; else hi=mid;
    }
    if(hi < 199.9) result.peso_breakeven = (lo+hi)/2;
  }

  // Precio competencia breakeven: find price where veredicto changes
  if(pc !== null && pc !== undefined && verBase !== 'EVITAR'){
    let lo=0, hi=pc*3;
    for(let i=0;i<40;i++){
      const mid=(lo+hi)/2;
      const pTest = {...p, precio_competencia_usd:mid};
      const v = calcValVeredicto(pTest, s).veredicto_base;
      if(v === verBase) lo=mid; else hi=mid;
    }
    if(lo > 0.1) result.precio_comp_breakeven = (lo+hi)/2;
  }

  return result;
}

function calcComboBlended(selectedProducts, s, mismo_envio){
  if(!selectedProducts || selectedProducts.length === 0) return null;
  const results = selectedProducts.map(p => calcValVeredicto(p, s));
  let total_cost = 0;
  let price_sum = 0;

  const anyC1 = results.some(r => r.canal === 'C1');

  results.forEach((r, i) => {
    const p = selectedProducts[i];
    let cost;
    if(mismo_envio && anyC1){
      // Each C1 product: remove honorarios+domicilio, then compare with C2
      const c1_adj = r.c1.costo - s.c1_honorarios - s.c1_domicilio;
      const c2_cost = r.c2.costo;
      cost = Math.min(c1_adj, c2_cost);
    } else {
      cost = r.costo;
    }
    total_cost += cost;
    // If mismo_envio C1, add fixed costs once for the whole combo
  });

  if(mismo_envio && anyC1){
    total_cost += s.c1_honorarios + s.c1_domicilio;
  }

  results.forEach(r => {
    if(r.precio_recomendado) price_sum += r.precio_recomendado;
  });

  const price_combo = price_sum * (1 - s.descuento_combo_pct/100);
  const blended_margin_abs = price_combo - total_cost;
  const blended_margin_pct = total_cost > 0 ? (blended_margin_abs / total_cost) * 100 : 0;

  return {total_cost, price_combo, blended_margin_abs, blended_margin_pct, individual: results};
}

// ── Librería ───────────────────────────────────────────────────────────────────
function renderValLibreria(){
  const s = valSettings();
  let prods = valProducts();

  // Get unique categories
  const cats = [...new Set(prods.map(p=>p.categoria))].sort();

  // Compute veredicto for filter
  let enriched = prods.map(p => {
    const r = calcValVeredicto(p, s);
    return {...p, _r:r};
  });

  if(valFilter.categoria) enriched = enriched.filter(p=>p.categoria===valFilter.categoria);
  if(valFilter.veredicto) enriched = enriched.filter(p=>p._r.veredicto===valFilter.veredicto);

  enriched.sort((a,b)=>{
    let av=a[valSort.field], bv=b[valSort.field];
    if(valSort.field==='fob'||valSort.field==='peso'){ av=parseFloat(av)||0; bv=parseFloat(bv)||0; }
    else if(valSort.field==='_costo'){ av=a._r.costo||0; bv=b._r.costo||0; }
    else if(valSort.field==='_margen_pct'){ av=a._r.margen_pct??-Infinity; bv=b._r.margen_pct??-Infinity; }
    else if(valSort.field==='_margen_abs'){ av=a._r.margen_abs??-Infinity; bv=b._r.margen_abs??-Infinity; }
    else if(valSort.field==='_precio'){ av=a._r.precio_recomendado||0; bv=b._r.precio_recomendado||0; }
    if(av<bv) return -1*valSort.dir;
    if(av>bv) return 1*valSort.dir;
    return 0;
  });

  function sortBtn(field, label){
    const active = valSort.field===field;
    const icon = active ? (valSort.dir===1?'↑':'↓') : '';
    return `<span style="cursor:pointer;user-select:none;${active?'color:var(--accent);':''}" onclick="valSort.field='${field}';valSort.dir=valSort.field==='${field}'?-valSort.dir:1;valSort.field='${field}';renderValidador()">${label}${icon}</span>`;
  }

  // Fix sort toggle: simpler approach
  function sortTh(field, label){
    const active = valSort.field===field;
    const icon = active?(valSort.dir===1?' ↑':' ↓'):'';
    return `<th style="cursor:pointer;${active?'color:var(--accent)':''}" onclick="if(valSort.field==='${field}'){valSort.dir*=-1;}else{valSort.field='${field}';valSort.dir=1;}renderValidador()">${label}${icon}</th>`;
  }

  const rows = enriched.map(p=>{
    const r = p._r;
    const warnPeso = !p.peso_confirmado && (r.veredicto==='STANDALONE'||r.veredicto==='COMBO-ONLY') ? ' ⚠' : '';
    const bg = valRowBg(r.veredicto);
    return `<tr style="background:${bg};cursor:pointer" onclick="openValFicha('${p.id}')">
      <td style="font-weight:600">${p.nombre}${warnPeso}</td>
      <td><span style="font-size:11px;color:var(--text-muted)">${p.categoria}</span></td>
      <td>${fUSD(p.fob)}</td>
      <td>${p.peso} kg</td>
      <td>${r.canal}</td>
      <td>${fUSD(r.costo)}</td>
      <td style="color:${r.precio_recomendado===null&&r.precio_si_match!==null?'#EF4444':''}">${r.precio_recomendado!==null?fUSD(r.precio_recomendado):r.precio_si_match!==null?fUSD(r.precio_si_match):'—'}</td>
      <td style="color:${r.margen_pct!==null&&r.margen_pct<0?'#EF4444':''}">${r.margen_pct!==null?fPct(r.margen_pct):'—'}</td>
      <td style="color:${r.margen_abs!==null&&r.margen_abs<0?'#EF4444':''}">${r.margen_abs!==null?fUSD(r.margen_abs):'—'}</td>
      <td>${p.precio_encontrado!=null?fUSD(p.precio_encontrado):'—'}</td>
      <td>${(()=>{ if(p.precio_encontrado==null) return '—'; const mg=(p.precio_encontrado-r.costo)/r.costo*100; return `<span style="color:${mg>=0?'#22C55E':'#EF4444'}">${fPct(mg)}</span>`; })()}</td>
      <td>${valBadge(r.veredicto)}</td>
      <td>${p.tiene_dist_oficial?'<span style="color:var(--yellow)">⚠ Dist. oficial</span>':''}</td>
    </tr>`;
  }).join('');

  const veredictoOpts = ['MOTOR DE MARGEN','STANDALONE','PRICING-POWER','COMBO-ONLY','EVITAR'];

  return `
    <div style="display:flex;gap:12px;margin-bottom:16px;align-items:center;flex-wrap:wrap">
      <select class="form-control" style="width:180px" onchange="valFilter.categoria=this.value;renderValidador()">
        <option value="">Todas las categorías</option>
        ${cats.map(c=>`<option value="${c}"${valFilter.categoria===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <select class="form-control" style="width:180px" onchange="valFilter.veredicto=this.value;renderValidador()">
        <option value="">Todos los veredictos</option>
        ${veredictoOpts.map(v=>`<option value="${v}"${valFilter.veredicto===v?'selected':''}>${VAL_LABELS[v]||v}</option>`).join('')}
      </select>
      <span style="color:var(--text-muted);font-size:12px;margin-left:auto">${enriched.length} productos</span>
      <button class="btn btn-primary btn-sm" onclick="openValProductForm(null)">+ Producto</button>
    </div>
    <div class="table-wrap">
      <table class="table">
        <thead><tr>
          ${sortTh('nombre','Producto')}
          <th>Cat.</th>
          ${sortTh('fob','FOB')}
          ${sortTh('peso','Peso')}
          <th>Canal</th>
          ${sortTh('_costo','Costo landed')}
          ${sortTh('_precio','Precio rec.')}
          ${sortTh('_margen_pct','Margen %')}
          ${sortTh('_margen_abs','Margen $')}
          <th>Precio enc.</th>
          <th>Mg. si matcheo</th>
          <th>Veredicto</th>
          <th></th>
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="13" style="text-align:center;color:var(--text-muted);padding:40px">Sin productos</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

function openValFicha(id){
  const prods = valProducts();
  const p = prods.find(x=>x.id===id);
  if(!p) return;
  const s = valSettings();
  const html = buildValFicha(p, s);
  // Use custom panel without save button in footer (ficha has its own buttons)
  document.getElementById('panelTitle').textContent = p.nombre;
  document.getElementById('panelBody').innerHTML = html;
  document.getElementById('panelFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closePanel()">Cerrar</button>
    <button class="btn btn-primary" onclick="openValProductForm('${id}')">✏️ Editar</button>
  `;
  panelCallback = null;
  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('slidePanel').classList.add('open');
}

function buildValFicha(p, s){
  const r = calcValVeredicto(p, s);
  const sens = calcValSensibilidad(p, s);
  const {c1, c2} = r;

  const overrideBadge = r.override ? `<span style="margin-left:8px;font-size:11px;background:#F59E0B22;color:#F59E0B;border:1px solid #F59E0B44;border-radius:8px;padding:2px 8px">⚠ override manual</span>` : '';

  function row(label, val, highlight){
    return `<tr><td style="color:var(--text-muted);font-size:12px;padding:4px 8px 4px 0">${label}</td><td style="text-align:right;font-size:13px;${highlight?'font-weight:700;color:var(--accent)':''};padding:4px 0">${val}</td></tr>`;
  }

  const c1Table = `
    <table style="width:100%">
      ${row('FOB', fUSD(p.fob))}
      ${row('Tributos ('+s.c1_tributos_pct+'%)', fUSD(c1.tributos))}
      ${row('Tasa estadística ('+s.c1_tasa_pct+'%)', fUSD(c1.tasa))}
      ${row('IVA ('+s.c1_iva_pct+'%)', fUSD(c1.iva))}
      ${row('Honorarios', fUSD(c1.honorarios))}
      ${row('Domicilio', fUSD(c1.domicilio))}
      ${row('Flete intl ('+p.peso+'kg × $'+s.c1_flete_intl+')', fUSD(c1.flete_intl))}
      ${row('Gastos origen', fUSD(c1.gastos_origen))}
      ${row('Almacenaje', fUSD(c1.almacenaje))}
      ${row('Costo C1', fUSD(c1.costo), true)}
    </table>`;

  const c2Table = `
    <table style="width:100%">
      ${row('FOB', fUSD(p.fob))}
      ${row('Tax ('+s.c2_tax_pct+'%)', fUSD(c2.tax))}
      ${row('Flete ('+p.peso+'kg × $'+s.c2_flete+')', fUSD(c2.flete))}
      ${row('—','')}
      ${row('—','')}
      ${row('—','')}
      ${row('—','')}
      ${row('—','')}
      ${row('—','')}
      ${row('Costo C2', fUSD(c2.costo), true)}
    </table>`;

  const sensHtml = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:4px">
      <div class="card-sm" style="padding:12px">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Canal crossover (peso)</div>
        <div style="font-size:14px;font-weight:600">${sens.canal_crossover!==null?sens.canal_crossover.toFixed(1)+' kg':'N/A'}</div>
        <div style="font-size:10px;color:var(--text-muted)">peso donde C1=C2</div>
      </div>
      <div class="card-sm" style="padding:12px">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Peso breakeven veredicto</div>
        <div style="font-size:14px;font-weight:600">${sens.peso_breakeven!==null?sens.peso_breakeven.toFixed(1)+' kg':'N/A'}</div>
        <div style="font-size:10px;color:var(--text-muted)">veredicto cambia aquí</div>
      </div>
      <div class="card-sm" style="padding:12px">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Precio comp. breakeven</div>
        <div style="font-size:14px;font-weight:600">${sens.precio_comp_breakeven!==null?fUSD(sens.precio_comp_breakeven):'N/A'}</div>
        <div style="font-size:10px;color:var(--text-muted)">comp. donde cambia veredicto</div>
      </div>
    </div>`;

  const warnPeso = !p.peso_confirmado && (r.veredicto==='STANDALONE'||r.veredicto==='COMBO-ONLY')
    ? `<div style="background:#F59E0B18;border:1px solid #F59E0B44;border-radius:8px;padding:8px 12px;font-size:12px;color:#F59E0B;margin-bottom:12px">⚠ Peso no confirmado — sensibilidad puede variar</div>`
    : '';

  return `

    <div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:13px;color:var(--text-muted)">${p.categoria}</span>
        <span style="color:var(--border)">|</span>
        <span style="font-size:13px;color:var(--text-muted)">FOB ${fUSD(p.fob)}</span>
        <span style="color:var(--border)">|</span>

        ${p.tiene_dist_oficial?'<span style="font-size:11px;background:#F59E0B18;color:#F59E0B;border-radius:8px;padding:2px 8px;border:1px solid #F59E0B44">Dist. oficial</span>':''}
      </div>
    </div>

    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;font-weight:600">VEREDICTO</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">

      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px">
        <div><div style="font-size:11px;color:var(--text-muted)">Canal óptimo</div><div style="font-size:16px;font-weight:700">${r.canal}</div></div>
        <div><div style="font-size:11px;color:var(--text-muted)">Costo landed</div><div style="font-size:16px;font-weight:700">${fUSD(r.costo)}</div></div>
        <div><div style="font-size:11px;color:var(--text-muted)">${r.precio_recomendado!==null?'Precio rec.':'Precio comp. (ref)'}</div><div style="font-size:16px;font-weight:700;color:${r.precio_recomendado!==null?'var(--accent)':'#EF4444'}">${r.precio_recomendado!==null?fUSD(r.precio_recomendado):(r.precio_si_match!==null?fUSD(r.precio_si_match):'—')}</div></div>

function collectValProductForm(){
  const pcVal = document.getElementById('vf_pc').value.trim();
  const peVal = document.getElementById('vf_pe').value.trim();
  return {
    nombre: document.getElementById('vf_nombre').value.trim(),
    categoria: document.getElementById('vf_categoria').value,
    fob: parseFloat(document.getElementById('vf_fob').value)||0,
    peso: parseFloat(document.getElementById('vf_peso').value)||0,
    unidades: parseInt(document.getElementById('vf_unidades').value)||1,
    precio_competencia_usd: pcVal!==''?parseFloat(pcVal):null,
    competidor: document.getElementById('vf_competidor').value.trim()||null,
    precio_encontrado: peVal!==''?parseFloat(peVal):null,
    tiene_dist_oficial: document.getElementById('vf_dist_oficial').checked,
    peso_confirmado: document.getElementById('vf_peso_confirmado').checked,
    override_veredicto: document.getElementById('vf_override').value,
    notas: document.getElementById('vf_notas').value.trim(),
    popularidad: 'Media'
  };
}

function saveValProduct(data, existingId){
  let prods = valProducts();
  if(existingId){
    const idx = prods.findIndex(x=>x.id===existingId);
    if(idx>=0) prods[idx] = {...prods[idx], ...data};
  } else {
    const maxNum = prods.reduce((m,p)=>{ const n=parseInt(p.id.replace('VAL-','')); return n>m?n:m; },0);
    const newId = 'VAL-'+(maxNum+1).toString().padStart(4,'0');
    prods.push({id:newId, es_candidato:false, ...data});
  }
  saveValProducts(prods);
  closePanel();
  renderValidador();
}

function deleteValProduct(id){
  openConfirm(()=>{
    let prods = valProducts().filter(p=>p.id!==id);
    saveValProducts(prods);
    closePanel();
    renderValidador();
  });
}

function toggleValCandidato(id){
  let prods = valProducts();
  const p = prods.find(x=>x.id===id);
  if(p){ p.es_candidato = !p.es_candidato; saveValProducts(prods); }
  // Re-render ficha in panel
  const s = valSettings();
  const updated = prods.find(x=>x.id===id);
  if(updated) document.getElementById('panelBody').innerHTML = buildValFicha(updated, s);
  // Also update libreria if visible
  if(valTab==='libreria') renderValidador();
}

// ── Combos ─────────────────────────────────────────────────────────────────────
function renderValCombos(){
  const s = valSettings();
  const prods = valProducts();
  const savedCombos = getValCombos();

  const productRows = prods.map(p=>{
    const r = calcValVeredicto(p, s);
    const checked = valComboSelected.includes(p.id);
    return `<tr style="${checked?'background:rgba(232,98,44,0.08)':''}">
      <td><input type="checkbox" ${checked?'checked':''} onchange="valComboToggle('${p.id}',this.checked)"></td>
      <td style="font-weight:500">${p.nombre}</td>
      <td style="color:var(--text-muted);font-size:12px">${p.categoria}</td>
      <td>${fUSD(r.costo)}</td>
      <td>${r.precio_recomendado!==null?fUSD(r.precio_recomendado):'—'}</td>
      <td>${valBadge(r.veredicto)}</td>
    </tr>`;
  }).join('');

  // Live calc
  let liveHtml = '';
  if(valComboSelected.length >= 2){
    const sel = prods.filter(p=>valComboSelected.includes(p.id));
    const res = calcComboBlended(sel, s, valMismoEnvio);
    if(res){
      const marginColor = res.blended_margin_pct >= s.margen_objetivo_pct ? 'var(--green)' : res.blended_margin_pct >= s.piso_margen_pct ? 'var(--yellow)' : 'var(--red)';
      liveHtml = `
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px">
          <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:10px">COMBO LIVE — ${sel.length} productos${valMismoEnvio?' (mismo envío)':''}</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
            <div><div style="font-size:11px;color:var(--text-muted)">Costo total</div><div style="font-size:18px;font-weight:700">${fUSD(res.total_cost)}</div></div>
            <div><div style="font-size:11px;color:var(--text-muted)">Precio combo (-${s.descuento_combo_pct}%)</div><div style="font-size:18px;font-weight:700;color:var(--accent)">${fUSD(res.price_combo)}</div></div>
            <div><div style="font-size:11px;color:var(--text-muted)">Margen $</div><div style="font-size:18px;font-weight:700;color:${marginColor}">${fUSD(res.blended_margin_abs)}</div></div>
            <div><div style="font-size:11px;color:var(--text-muted)">Margen %</div><div style="font-size:18px;font-weight:700;color:${marginColor}">${fPct(res.blended_margin_pct)}</div></div>
          </div>
          <div style="margin-top:12px">
            <input id="valComboName" class="form-control" style="width:240px;display:inline-block;margin-right:8px" placeholder="Nombre del combo…">
            <button class="btn btn-primary btn-sm" onclick="saveValComboFromUI()">Guardar combo</button>
          </div>
        </div>`;
    }
  }

  const savedRows = savedCombos.map(c=>`
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-weight:600">${c.name}</div>
        <div style="font-size:12px;color:var(--text-muted)">${(c.productos||[]).join(', ')}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:13px">${fUSD(c.total_cost)} → <span style="color:var(--accent)">${fUSD(c.price_combo)}</span></div>
        <div style="font-size:12px;color:var(--text-muted)">${fPct(c.blended_margin_pct)}</div>
      </div>
      <button class="btn btn-danger btn-icon btn-sm" onclick="deleteValCombo('${c.id}')" style="margin-left:12px">🗑️</button>
    </div>`).join('');

  return `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
        <input type="checkbox" ${valMismoEnvio?'checked':''} onchange="valMismoEnvio=this.checked;renderValidador()">
        Mismo envío (C1 comparte honorarios + domicilio)
      </label>
      ${valComboSelected.length>0?`<button class="btn btn-secondary btn-sm" onclick="valComboSelected=[];renderValidador()">Limpiar selección</button>`:''}
    </div>
    ${liveHtml}
    <div class="table-wrap" style="margin-bottom:24px">
      <table class="table">
        <thead><tr><th>✓</th><th>Producto</th><th>Cat.</th><th>Costo</th><th>Precio rec.</th><th>Veredicto</th></tr></thead>
        <tbody>${productRows}</tbody>
      </table>
    </div>
    ${savedCombos.length>0?`<div><div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:10px">COMBOS GUARDADOS</div>${savedRows}</div>`:''}
  `;
}

function valComboToggle(id, checked){
  if(checked){ if(!valComboSelected.includes(id)) valComboSelected.push(id); }
  else { valComboSelected = valComboSelected.filter(x=>x!==id); }
  renderValidador();
}

function saveValComboFromUI(){
  const nameEl = document.getElementById('valComboName');
  const name = nameEl ? nameEl.value.trim() : '';
  if(!name){ alert('Ponele un nombre al combo'); return; }
  const s = valSettings();
  const prods = valProducts().filter(p=>valComboSelected.includes(p.id));
  const res = calcComboBlended(prods, s, valMismoEnvio);
  if(!res) return;
  const combos = getValCombos();
  const id = 'VCOM-'+(Date.now());
  combos.push({
    id, name,
    productos: prods.map(p=>p.nombre),
    ids: valComboSelected.slice(),
    mismo_envio: valMismoEnvio,
    total_cost: res.total_cost,
    price_combo: res.price_combo,
    blended_margin_abs: res.blended_margin_abs,
    blended_margin_pct: res.blended_margin_pct,
    created_at: new Date().toISOString()
  });
  saveValCombos(combos);
  valComboSelected = [];
  renderValidador();
}

function deleteValCombo(id){
  openConfirm(()=>{
    const combos = getValCombos().filter(c=>c.id!==id);
    saveValCombos(combos);
    renderValidador();
  });
}

// ── Simulador ──────────────────────────────────────────────────────────────────
function renderValSimulador(){
  const s = valSettings();
  const prods = valProducts();
  const candidatos = prods.filter(p=>p.es_candidato);
  const all = prods.map(p=>({p, r:calcValVeredicto(p,s)}));

  // Per-category breakdown
  const cats = {};
  all.forEach(({p,r})=>{
    if(!cats[p.categoria]) cats[p.categoria]={count:0,motor:0,standalone:0,combo:0,evitar:0,pricing:0};
    const c=cats[p.categoria]; c.count++;
    if(r.veredicto==='MOTOR DE MARGEN') c.motor++;
    else if(r.veredicto==='STANDALONE') c.standalone++;
    else if(r.veredicto==='COMBO-ONLY') c.combo++;
    else if(r.veredicto==='EVITAR') c.evitar++;
    else if(r.veredicto==='PRICING-POWER') c.pricing++;
  });

  // Overall stats
  const stats = {motor:0,standalone:0,combo:0,evitar:0,pricing:0};
  all.forEach(({r})=>{
    if(r.veredicto==='MOTOR DE MARGEN') stats.motor++;
    else if(r.veredicto==='STANDALONE') stats.standalone++;
    else if(r.veredicto==='COMBO-ONLY') stats.combo++;
    else if(r.veredicto==='EVITAR') stats.evitar++;
    else if(r.veredicto==='PRICING-POWER') stats.pricing++;
  });

  const catRows = Object.entries(cats).map(([cat,c])=>`
    <tr>
      <td>${cat}</td>
      <td>${c.count}</td>
      <td style="color:#22C55E">${c.motor}</td>
      <td style="color:#86EFAC">${c.standalone}</td>
      <td style="color:#3B82F6">${c.pricing}</td>
      <td style="color:#F59E0B">${c.combo}</td>
      <td style="color:#EF4444">${c.evitar}</td>
    </tr>`).join('');

  const candidatoCards = candidatos.length===0
    ? `<p style="color:var(--text-muted);font-size:13px">Sin candidatos marcados. Abrí la ficha de un producto y marcalo como candidato del mes.</p>`
    : candidatos.map(p=>{
        const r = calcValVeredicto(p, s);
        return `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div>
            <div style="font-weight:600;margin-bottom:4px">${p.nombre} <span style="font-size:11px;color:var(--text-muted)">${p.categoria}</span></div>
            <div style="display:flex;gap:8px;align-items:center">${valBadge(r.veredicto)}<span style="font-size:12px;color:var(--text-muted)">FOB ${fUSD(p.fob)} · Costo ${fUSD(r.costo)}</span></div>
          </div>
          <div style="text-align:right">
            <div style="font-size:18px;font-weight:700;color:var(--accent)">${r.precio_recomendado!==null?fUSD(r.precio_recomendado):'—'}</div>
            <div style="font-size:12px;color:var(--text-muted)">${r.margen_pct!==null?fPct(r.margen_pct)+' margen':'sin precio'}</div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="toggleValCandidato('${p.id}');renderValidador()">★</button>
        </div>`;
      }).join('');

  return `
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px">
      <div class="card-sm" style="padding:14px;border-color:#22C55E44"><div style="font-size:11px;color:var(--text-muted)">Motor de Margen</div><div style="font-size:28px;font-weight:700;color:#22C55E">${stats.motor}</div></div>
      <div class="card-sm" style="padding:14px;border-color:#86EFAC44"><div style="font-size:11px;color:var(--text-muted)">Standalone</div><div style="font-size:28px;font-weight:700;color:#86EFAC">${stats.standalone}</div></div>
      <div class="card-sm" style="padding:14px;border-color:#3B82F644"><div style="font-size:11px;color:var(--text-muted)">Pricing Power</div><div style="font-size:28px;font-weight:700;color:#3B82F6">${stats.pricing}</div></div>
      <div class="card-sm" style="padding:14px;border-color:#F59E0B44"><div style="font-size:11px;color:var(--text-muted)">Combo Only</div><div style="font-size:28px;font-weight:700;color:#F59E0B">${stats.combo}</div></div>
      <div class="card-sm" style="padding:14px;border-color:#EF444444"><div style="font-size:11px;color:var(--text-muted)">Evitar</div><div style="font-size:28px;font-weight:700;color:#EF4444">${stats.evitar}</div></div>
    </div>

    <div style="margin-bottom:24px">
      <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:12px">CANDIDATOS DEL MES ★</div>
      <div style="display:grid;gap:8px">${candidatoCards}</div>
    </div>

    <div>
      <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:10px">BREAKDOWN POR CATEGORÍA</div>
      <div class="table-wrap">
        <table class="table">
          <thead><tr><th>Categoría</th><th>Total</th><th style="color:#22C55E">Motor</th><th style="color:#86EFAC">Standalone</th><th style="color:#3B82F6">Pricing P.</th><th style="color:#F59E0B">Combo</th><th style="color:#EF4444">Evitar</th></tr></thead>
          <tbody>${catRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

        </div>
      </div>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px">
        <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:12px">REGLAS DE VEREDICTO</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
          ${numField('undercut_pct','Undercut competencia %',s.undercut_pct,0.5)}
          ${numField('margen_objetivo_pct','Margen objetivo %',s.margen_objetivo_pct,0.5)}
          ${numField('margen_sin_comp_pct','Margen sin comp. %',s.margen_sin_comp_pct,0.5)}
          ${numField('piso_margen_pct','Piso margen % (standalone)',s.piso_margen_pct,0.5)}
          ${numField('piso_margen_abs','Piso margen abs $ (standalone)',s.piso_margen_abs,5)}
          ${numField('umbral_ticket_alto','Umbral ticket alto $',s.umbral_ticket_alto,10)}
          ${numField('descuento_combo_pct','Descuento combo %',s.descuento_combo_pct,0.5)}
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="saveValSettingsFromUI()">Guardar ajustes</button>
        <button class="btn btn-secondary" onclick="resetValSettings()">Restaurar defaults</button>
      </div>
    </div>
  `;
}

function saveValSettingsFromUI(){
  function n(id){ return parseFloat(document.getElementById('vs_'+id).value)||0; }
  const s = {
    c1_tributos_pct:n('c1_tributos_pct'), c1_tasa_pct:n('c1_tasa_pct'), c1_iva_pct:n('c1_iva_pct'),
    c1_honorarios:n('c1_honorarios'), c1_domicilio:n('c1_domicilio'),
    c1_flete_intl:n('c1_flete_intl'), c1_gastos_origen:n('c1_gastos_origen'), c1_almacenaje:n('c1_almacenaje'),
    c2_tax_pct:n('c2_tax_pct'), c2_flete:n('c2_flete'),
    undercut_pct:n('undercut_pct'), margen_objetivo_pct:n('margen_objetivo_pct'),
    margen_sin_comp_pct:n('margen_sin_comp_pct'), piso_margen_pct:n('piso_margen_pct'),
    piso_margen_abs:n('piso_margen_abs'), umbral_ticket_alto:n('umbral_ticket_alto'),
    dias_almacenaje_default:n('dias_almacenaje_default'), descuento_combo_pct:n('descuento_combo_pct')
  };
  saveValSettings(s);
  renderValidador();
}

function resetValSettings(){
  saveValSettings({...INIT_VAL_SETTINGS});
  renderValidador();
}

// ── Hook into submitPanel ──────────────────────────────────────────────────────
// Patch submitPanel to handle val-product form
const _origSubmitPanel = submitPanel;
function submitPanel(){
  if(currentFormSection==='val-product'){
    const data = collectValProductForm();
    if(data && panelCallback) panelCallback(data);
    return;
  }
  _origSubmitPanel();
}

// ── openConfirm helper — delegates to existing confirmDelete ───────────────────
function openConfirm(cb){ confirmDelete(cb); }

// ─── VALIDADOR MODULE END ──────────────────────────────────────────────────────

// Keyboard: close panel with Escape
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closePanel(); closeModal(); } });

initApp();
</script>
</body>
</html>
