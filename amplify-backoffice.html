<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amplify — Backoffice</title>
<style>
:root {
  --bg-base: #0C0C0C;
  --bg-sidebar: #111111;
  --bg-card: #1A1A1A;
  --bg-card-hover: #212121;
  --bg-input: #242424;
  --border: #2C2C2C;
  --border-focus: #E8622C;
  --accent: #E8622C;
  --accent-hover: #D4561F;
  --accent-light: rgba(232,98,44,0.12);
  --text-primary: #F5F5F5;
  --text-secondary: #A0A0A0;
  --text-muted: #5A5A5A;
  --green: #22C55E;
  --red: #EF4444;
  --yellow: #F59E0B;
  --shadow-card: none;
  --shadow-panel: none;
  --badge-gray-bg: rgba(160,160,160,.13);
  --badge-gray-color: #A0A0A0;
}

/* ── LIGHT MODE ──────────────────────────────────────────── */
[data-theme="light"] {
  --bg-base: #F1F1F3;
  --bg-sidebar: #FFFFFF;
  --bg-card: #FFFFFF;
  --bg-card-hover: #F7F7F8;
  --bg-input: #F1F1F3;
  --border: #E2E2E6;
  --border-focus: #E8622C;
  --accent: #E8622C;
  --accent-hover: #D4561F;
  --accent-light: rgba(232,98,44,0.10);
  --text-primary: #0A0A0B;
  --text-secondary: #50505A;
  --text-muted: #9898A8;
  --green: #15803D;
  --red: #B91C1C;
  --yellow: #B45309;
  --shadow-card: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
  --shadow-panel: -6px 0 24px rgba(0,0,0,.10);
  --badge-gray-bg: rgba(0,0,0,.07);
  --badge-gray-color: #50505A;
}
[data-theme="light"] .card { box-shadow: var(--shadow-card); }
[data-theme="light"] .table-wrap { box-shadow: 0 1px 3px rgba(0,0,0,.05); }
[data-theme="light"] .sidebar { box-shadow: 1px 0 0 var(--border), 4px 0 16px rgba(0,0,0,.04); }
[data-theme="light"] .slide-panel { box-shadow: var(--shadow-panel); }
[data-theme="light"] .modal { box-shadow: 0 8px 32px rgba(0,0,0,.12); }
[data-theme="light"] .hamburger { box-shadow: var(--shadow-card); }
[data-theme="light"] .badge-green { background: rgba(21,128,61,.12); }
[data-theme="light"] .badge-yellow { background: rgba(180,83,9,.12); }
[data-theme="light"] .badge-red { background: rgba(185,28,28,.12); }
[data-theme="light"] .badge-accent { background: rgba(232,98,44,.10); }

/* smooth theme transitions */
body, .sidebar, .main, .card, .slide-panel, .panel-header, .panel-footer,
.modal, .hamburger, .theme-toggle, thead th, tfoot td, .form-control,
.filter-select, .nav-item, .table-wrap {
  transition: background-color .22s ease, color .18s ease,
              border-color .18s ease, box-shadow .22s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg-base);color:var(--text-primary);display:flex;min-height:100vh;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}

/* SIDEBAR */
.sidebar{width:220px;min-height:100vh;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:50;transition:transform .3s ease;overflow-y:auto}
.sidebar-logo{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:3px;text-transform:uppercase}
.sidebar-logo p{font-size:11px;color:var(--text-muted);margin-top:2px}
.sidebar-tc{padding:10px 20px;border-bottom:1px solid var(--border);font-size:12px}
.sidebar-tc .tc-label{color:var(--text-muted)}
.sidebar-tc .tc-value{color:var(--accent);font-weight:700;font-size:13px}
.sidebar-tc .tc-date{color:var(--text-muted);font-size:10px;margin-top:1px}
.sidebar-nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text-secondary);font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent;user-select:none}
.nav-item:hover{color:var(--text-primary);background:var(--bg-card)}
.nav-item.active{color:var(--text-primary);background:var(--accent-light);border-left-color:var(--accent)}
.nav-item .icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}

/* MAIN */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
.content{flex:1;padding:28px 32px;overflow-y:auto;height:100vh}
.section{display:none}
.section.active{display:block}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.section-title{font-size:22px;font-weight:700}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{padding:16px}
.card-title{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.card-value{font-size:26px;font-weight:700;color:var(--text-primary);line-height:1.2}
.card-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}

/* GRIDS */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}

/* TABLES */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg-base);color:var(--text-muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg-card-hover)}
tbody td{padding:9px 12px;white-space:nowrap;color:var(--text-primary)}
tfoot td{padding:9px 12px;white-space:nowrap;font-weight:600;font-size:12px;color:var(--text-secondary);background:var(--bg-base);border-top:1px solid var(--border)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-gray{background:var(--badge-gray-bg);color:var(--badge-gray-color)}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge-accent{background:var(--accent-light);color:var(--accent)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-blue{background:rgba(96,165,250,.15);color:#60A5FA}
[data-theme="light"] .badge-blue{background:rgba(37,99,235,.10);color:#1D4ED8}

/* SENA PRODUCT LINES */
.sena-product-line{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;padding:10px;background:var(--bg-input);border-radius:8px;border:1px solid var(--border)}
.sena-product-line .product-select{flex:1;min-width:0}
.sena-product-line .price-input{width:110px;flex-shrink:0}
.sena-product-line .remove-btn{flex-shrink:0;margin-top:1px}
.sena-new-product-fields{background:var(--bg-base);border-radius:6px;padding:10px;margin-top:8px;border:1px dashed var(--border)}
.sena-totals{background:var(--bg-base);border-radius:8px;padding:14px;border:1px solid var(--border);margin-top:4px}
.sena-totals-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.sena-totals-row.total{font-weight:700;font-size:15px;padding-top:8px;border-top:1px solid var(--border);margin-top:6px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;font-family:inherit;line-height:1}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
.btn-secondary:hover{color:var(--text-primary);border-color:var(--text-muted)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(239,68,68,.25)}
.btn-danger:hover{background:rgba(239,68,68,.08)}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
.btn-icon{padding:5px 7px;border-radius:6px;font-size:13px}
.btn-ghost{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px;line-height:1}
.btn-ghost:hover{color:var(--text-primary)}

/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-select,.filter-input{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-size:13px;font-family:inherit;padding:7px 12px;outline:none;cursor:pointer}
.filter-select:focus,.filter-input:focus{border-color:var(--border-focus);color:var(--text-primary)}

/* SLIDE PANEL */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;opacity:0;pointer-events:none;transition:opacity .3s}
.panel-overlay.open{opacity:1;pointer-events:all}
.slide-panel{position:fixed;top:0;right:0;width:480px;max-width:100vw;height:100vh;background:var(--bg-card);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;overflow:hidden}
.slide-panel.open{transform:translateX(0)}
.panel-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);flex-shrink:0}
.panel-header h2{font-size:17px;font-weight:600}
.panel-body{padding:24px;flex:1;overflow-y:auto}
.panel-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--bg-card);flex-shrink:0}

/* FORMS */
.form-group{margin-bottom:14px}
.form-group.readonly .form-control{color:var(--text-muted);cursor:default}
label.form-label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:5px}
.form-control{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;font-family:inherit;padding:9px 12px;transition:border-color .15s;outline:none;appearance:none}
.form-control:focus{border-color:var(--border-focus)}
.form-control[readonly]{color:var(--text-muted)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:3px}
.form-section-title{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;width:380px;max-width:90vw}
.modal h3{font-size:16px;font-weight:600;margin-bottom:8px}
.modal p{font-size:13px;color:var(--text-secondary);margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

/* COLORS */
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-yellow{color:var(--yellow)}
.text-accent{color:var(--accent)}
.text-muted{color:var(--text-muted)}
.text-secondary{color:var(--text-secondary)}
.text-bold{font-weight:600}

/* DASHBOARD */
.recent-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.recent-item:last-child{border-bottom:none}
.recent-name{font-size:13px;font-weight:500;margin-bottom:1px}
.recent-meta{font-size:11px;color:var(--text-muted)}
.cat-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.cat-label{font-size:12px;color:var(--text-secondary);width:90px;flex-shrink:0}
.cat-track{flex:1;height:5px;background:var(--border);border-radius:100px;overflow:hidden}
.cat-fill{height:100%;border-radius:100px;background:var(--accent)}
.cat-val{font-size:12px;color:var(--text-secondary);width:90px;text-align:right;flex-shrink:0}
.partner-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.partner-row:last-child{border-bottom:none}
.partner-bar{height:6px;background:var(--border);border-radius:100px;margin-top:6px;overflow:hidden;width:160px}
.partner-bar-fill{height:100%;border-radius:100px;transition:width .5s ease}

/* SETTINGS */
.settings-group{margin-bottom:28px}
.settings-group-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:16px}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500;flex:1}
.settings-desc{font-size:12px;color:var(--text-muted);margin-top:2px}

/* SIDEBAR BOTTOM / THEME TOGGLE */
.sidebar-bottom{padding:12px 16px;border-top:1px solid var(--border);margin-top:auto}
.theme-toggle{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;text-align:left}
.theme-toggle:hover{color:var(--text-primary);border-color:var(--text-muted);background:var(--bg-card-hover)}
.theme-toggle .toggle-track{margin-left:auto;width:32px;height:18px;background:var(--border);border-radius:100px;position:relative;transition:background .2s}
.theme-toggle .toggle-track.on{background:var(--accent)}
.theme-toggle .toggle-thumb{position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:100px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.theme-toggle .toggle-thumb.on{transform:translateX(14px)}

/* HAMBURGER */
.hamburger{display:none;position:fixed;top:14px;left:14px;z-index:60;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;font-size:16px;line-height:1}

/* MOBILE OVERLAY */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}

/* ARRIVED BADGE-SELECT */
.arrived-select{appearance:none;-webkit-appearance:none;border:none;border-radius:100px;font-size:11px;font-weight:600;font-family:inherit;padding:3px 10px;cursor:pointer;outline:none;white-space:nowrap}
.arrived-select.arrived-pending{background:var(--badge-gray-bg);color:var(--badge-gray-color)}
.arrived-select.arrived-si{background:rgba(34,197,94,.15);color:var(--green)}
.arrived-select.arrived-no{background:rgba(239,68,68,.15);color:var(--red)}
[data-theme="light"] .arrived-select.arrived-si{background:rgba(21,128,61,.12)}
[data-theme="light"] .arrived-select.arrived-no{background:rgba(185,28,28,.12)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.mobile-open{transform:translateX(0)}
  .sidebar-overlay{display:none}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0}
  .content{padding:16px;padding-top:56px;height:auto;min-height:100vh}
  .hamburger{display:block}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
  .section-header{flex-direction:column;align-items:flex-start}
  .slide-panel{width:100vw}
  .form-row{grid-template-columns:1fr}
}
@media(max-width:480px){
  .grid-3,.grid-4{grid-template-columns:1fr}
}
</style>
</head>
<body>

<button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h1>Amplify</h1>
    <p>Panel de control</p>
  </div>
  <div class="sidebar-tc" id="sidebarTC">
    <div class="tc-label">USD Oficial</div>
    <div class="tc-value" id="tcValue">Cargando…</div>
    <div class="tc-date" id="tcDate"></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard"><span class="icon">📊</span> Dashboard</div>
    <div class="nav-item" onclick="navigate('inventory')" id="nav-inventory"><span class="icon">📦</span> Inventario</div>
    <div class="nav-item" onclick="navigate('sales')" id="nav-sales"><span class="icon">💰</span> Ventas</div>
    <div class="nav-item" onclick="navigate('senas')" id="nav-senas"><span class="icon">🤝</span> Señas</div>
    <div class="nav-item" onclick="navigate('expenses')" id="nav-expenses"><span class="icon">💸</span> Gastos</div>
    <div class="nav-item" onclick="navigate('partners')" id="nav-partners"><span class="icon">⚖️</span> Socios</div>
    <div class="nav-item" onclick="navigate('settings')" id="nav-settings"><span class="icon">⚙️</span> Configuración</div>
  </nav>
  <div class="sidebar-bottom">
    <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">
      <span id="themeIcon">☀️</span>
      <span id="themeLabel">Modo claro</span>
      <span class="toggle-track" id="toggleTrack"><span class="toggle-thumb" id="toggleThumb"></span></span>
    </button>
  </div>
</aside>

<main class="main">
  <div class="content">
    <div class="section active" id="section-dashboard"></div>
    <div class="section" id="section-inventory"></div>
    <div class="section" id="section-sales"></div>
    <div class="section" id="section-senas"></div>
    <div class="section" id="section-expenses"></div>
    <div class="section" id="section-partners"></div>
    <div class="section" id="section-settings"></div>
  </div>
</main>

<!-- SLIDE PANEL -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="slide-panel" id="slidePanel">
  <div class="panel-header">
    <h2 id="panelTitle">Agregar</h2>
    <button class="btn-ghost" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
  <div class="panel-footer" id="panelFooter"></div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>¿Eliminar este registro?</h3>
    <p>Esta acción no se puede deshacer.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" id="modalConfirmBtn">Eliminar</button>
    </div>
  </div>
</div>

// ─── FORMATTING ───────────────────────────────────────────────────────────────
function fUSD(n){ n=parseFloat(n)||0; return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fARS(n){ n=Math.round(parseFloat(n)||0); return '$'+n.toLocaleString('es-AR'); }
function fPct(n){ if(n===null||n===undefined||isNaN(n)) return '—'; return (parseFloat(n)||0).toFixed(1)+'%'; }
function fDate(d){ if(!d) return '—'; try{ const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }catch(e){ return d; } }
function colorMargin(pct){ if(pct===null||pct===undefined||isNaN(pct)) return ''; if(pct<0) return 'text-red'; if(pct>=30) return 'text-green'; return ''; }

function statusBadge(s){
  if(s==='En Stock') return '<span class="badge badge-green">En Stock</span>';
  if(s==='Vendido') return '<span class="badge badge-gray">Vendido</span>';
  if(s==='Reservado') return '<span class="badge badge-yellow">Reservado</span>';
  if(s==='En Pedido') return '<span class="badge badge-blue">En Pedido</span>';
  return s;
}

// ─── EXCHANGE RATE ────────────────────────────────────────────────────────────
async function fetchTC(silent=false){
  try{
    const r = await fetch('https://dolarapi.com/v1/dolares/oficial');
    const d = await r.json();
    const tc = parseFloat(d.venta);
    if(!isNaN(tc) && tc>0){
      currentTC = tc;
      const s = getSettings();
      s.tc = tc;
      s.tc_date = new Date().toISOString();
      saveSettings(s);
      updateTCDisplay();
      if(!silent) renderCurrentSection();
      return true;
    }
  }catch(e){}
  if(!silent) updateTCDisplay();
  return false;
}

function updateTCDisplay(){
  const s = getSettings();
  currentTC = parseFloat(s.tc) || 1000;
  document.getElementById('tcValue').textContent = fARS(currentTC);
  if(s.tc_date){
    const d = new Date(s.tc_date);
    document.getElementById('tcDate').textContent = 'Act. '+d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  } else {
    document.getElementById('tcDate').textContent = 'Sin actualizar';
  }
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function navigate(section){
  document.getElementById('section-'+currentSection).classList.remove('active');
  document.getElementById('nav-'+currentSection).classList.remove('active');
  currentSection = section;
  document.getElementById('section-'+section).classList.add('active');
  document.getElementById('nav-'+section).classList.add('active');
  renderCurrentSection();
  if(window.innerWidth<=768) toggleSidebar(false);
}

function renderCurrentSection(){
  if(currentSection==='dashboard') renderDashboard();
  else if(currentSection==='inventory') renderInventory();
  else if(currentSection==='sales') renderSales();
  else if(currentSection==='senas') renderSenas();
  else if(currentSection==='expenses') renderExpenses();
  else if(currentSection==='partners') renderPartners();
  else if(currentSection==='settings') renderSettings();
}

function toggleSidebar(force){
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  const isOpen = sb.classList.contains('mobile-open');
  const shouldOpen = force !== undefined ? force : !isOpen;
  sb.classList.toggle('mobile-open', shouldOpen);
  ov.classList.toggle('open', shouldOpen);
}

// ─── CALC HELPERS ─────────────────────────────────────────────────────────────
function calcItem(item, tc){
  const total = (parseFloat(item.cost_usd)||0) + (parseFloat(item.tax_usd)||0);
  const totalARS = total * tc;
  const sp = parseFloat(item.sale_price_usd)||0;
  const spARS = parseFloat(item.sale_price_ars)||0;
  const effectiveSP = sp > 0 ? sp : (spARS > 0 ? spARS/tc : 0);
  const margin = effectiveSP > 0 ? effectiveSP - total : null;
  const marginPct = effectiveSP > 0 ? (margin/total*100) : null;
  return {total, totalARS, sp, spARS, effectiveSP, margin, marginPct};
}

function calcExpEquiv(exp, tc){
  const usd = parseFloat(exp.amount_usd)||0;
  const ars = parseFloat(exp.amount_ars)||0;
  if(usd>0) return usd;
  if(ars>0) return ars/tc;
  return 0;
}

  const saldoPendiente = senasActivas.reduce((a,s)=>{
    const total = (s.products||[]).reduce((t,p)=>t+(parseFloat(p.agreed_price_usd)||0),0);
    return a + (total - (parseFloat(s.sena_amount_usd)||0));

  const counts = {stock:0,sold:0,reserved:0,ordered:0};

            <div class="partner-bar"><div class="partner-bar-fill" style="width:${total>0?(santi/total*100).toFixed(1):50}%;background:#60A5FA"></div></div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:600">${fUSD(santi)}</div>
            <div class="text-muted" style="font-size:12px">${total>0?(santi/total*100).toFixed(1):0}%</div>
          </div>
        </div>
        ${frank>santi ? `<div style="margin-top:12px;padding:10px;background:rgba(239,68,68,.08);border-radius:8px;border:1px solid rgba(239,68,68,.2);font-size:13px">
          <span class="text-secondary">Santi debe a Frank</span>
          <span class="text-red text-bold" style="float:right">${fUSD(frank-santi)}</span>
        </div>` : ''}
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title" style="margin-bottom:12px">Últimas Ventas</div>
        ${recentSales.length===0 ? '<p class="text-muted" style="font-size:13px;padding:16px 0">Sin ventas registradas</p>' :
          recentSales.map(s=>{
            const item = inv.find(i=>i.id===s.inventory_id);
            return `<div class="recent-item">
              <div><div class="recent-name">${item?item.description:s.inventory_id}</div><div class="recent-meta">${s.id} · ${fDate(s.sale_date)} · ${s.channel}</div></div>
              <div style="text-align:right"><div style="font-weight:600">${fUSD(s.sale_price_usd)}</div><div class="recent-meta">${s.collected_by}</div></div>
            </div>`;
          }).join('')
        }
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:12px">Últimos Gastos</div>
        ${recentExp.length===0 ? '<p class="text-muted" style="font-size:13px;padding:16px 0">Sin gastos registrados</p>' :
          recentExp.map(e=>{
            const equiv = calcExpEquiv(e, tc);
            return `<div class="recent-item">
              <div><div class="recent-name">${e.description}</div><div class="recent-meta">${e.category} · ${fDate(e.date)} · ${e.paid_by}</div></div>
              <div style="text-align:right"><div style="font-weight:600">${fUSD(equiv)}</div><div class="recent-meta">${e.amount_ars>0?fARS(e.amount_ars)+' ARS':''}</div></div>
            </div>`;
          }).join('')
        }
      </div>
    </div>
  `;
}

// ─── INVENTORY ────────────────────────────────────────────────────────────────
function renderInventory(){
  const inv = getInventory();
  const tc = currentTC;
  let filtered = inv.filter(i=>{
    if(invFilter.status && i.status!==invFilter.status) return false;
    if(invFilter.category && i.category!==invFilter.category) return false;
    return true;
  });

  const cats = ['Headphones','Streamer','Amplificador','Tocadiscos','DAC','Speakers'];

  const rows = filtered.map(item=>{
    const c = calcItem(item,tc);
    const mc = colorMargin(c.marginPct);
    return `<tr>
      <td>${item.id}</td>
      <td style="max-width:200px;white-space:normal;min-width:140px">${item.description}</td>
      <td>${item.category}</td>
      <td>${fUSD(item.cost_usd)}</td>
      <td>${fUSD(item.tax_usd)}</td>
      <td class="text-bold">${fUSD(c.total)}</td>
      <td>${fARS(c.totalARS)}</td>
      <td>${fDate(item.purchase_date)}</td>
      <td>${statusBadge(item.status)}</td>
      <td>${arrivedArgSelect(item.id, item.arrived_arg||'')}</td>
      <td>${c.sp>0?fUSD(c.sp):'—'}</td>
      <td>${c.spARS>0?fARS(c.spARS):'—'}</td>
      <td class="${mc}">${c.margin!==null?fUSD(c.margin):'—'}</td>
      <td class="${mc}">${fPct(c.marginPct)}</td>
      <td>${item.collected_by||'—'}</td>
      <td style="max-width:140px;white-space:normal;min-width:80px;font-size:12px;color:var(--text-muted)">${item.notes||''}</td>
      <td>
        <div class="actions-cell">
          <button class="btn btn-secondary btn-icon btn-sm" onclick="editInventory('${item.id}')">✏️</button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="deleteInventory('${item.id}')">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('section-inventory').innerHTML = `
    <div class="section-header">
      <h2 class="section-title">Inventario <span style="color:var(--text-muted);font-size:16px;font-weight:400">(${inv.length} productos)</span></h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="exportInvCSV()">⬇️ CSV</button>
        <button class="btn btn-primary btn-sm" onclick="addInventory()">+ Agregar</button>
      </div>
    </div>
    <div class="filters">
      <select class="filter-select" onchange="invFilter.status=this.value;renderInventory()">
        <option value="">Todos los estados</option>
        <option value="En Stock" ${invFilter.status==='En Stock'?'selected':''}>En Stock</option>
        <option value="Vendido" ${invFilter.status==='Vendido'?'selected':''}>Vendido</option>
        <option value="Reservado" ${invFilter.status==='Reservado'?'selected':''}>Reservado</option>
        <option value="En Pedido" ${invFilter.status==='En Pedido'?'selected':''}>En Pedido</option>
      </select>
      <select class="filter-select" onchange="invFilter.category=this.value;renderInventory()">
        <option value="">Todas las categorías</option>
        ${cats.map(c=>`<option value="${c}" ${invFilter.category===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Código</th><th>Descripción</th><th>Categoría</th>
          <th>Costo USD</th><th>Tax+Envío</th><th>Total USD</th><th>Total ARS</th>
          <th>Fecha</th><th>Estado</th><th>Llegó a ARG</th>
          <th>Precio USD</th><th>Precio ARS</th>
          <th>Margen USD</th><th>Margen %</th>
          <th>Cobrado</th><th>Notas</th><th></th>
        </tr></thead>
        <tbody>${rows || '<tr><td colspan="17" style="text-align:center;padding:40px;color:var(--text-muted)">Sin registros</td></tr>'}</tbody>
      </table>
    </div>
  `;
  requestAnimationFrame(()=>document.querySelectorAll('.arrived-select').forEach(fitSelect));
}

function addInventory(){
  openPanel('Agregar Producto', buildInventoryForm(null), (data)=>{
    const inv = getInventory();
    const maxNum = inv.reduce((mx,i)=>{ const n=parseInt(i.id.replace('AMP-',''))||0; return Math.max(mx,n); },0);
    data.id = 'AMP-'+(maxNum+1).toString().padStart(4,'0');
    inv.push(data);
    saveInventory(inv);
    renderInventory();
    closePanel();
  });
}

function editInventory(id){
  const inv = getInventory();
  const item = inv.find(i=>i.id===id);
  if(!item) return;
  openPanel('Editar Producto: '+item.id, buildInventoryForm(item), (data)=>{
    const idx = inv.findIndex(i=>i.id===id);
    inv[idx] = {...item, ...data, id:item.id};
    saveInventory(inv);
    renderInventory();
    closePanel();
  });
}

function arrivedArgSelect(id, value){
  const cls = value==='Si'?'arrived-si':value==='No'?'arrived-no':'arrived-pending';
  return `<select class="arrived-select ${cls}" onchange="setArrivedArg('${id}',this.value)">
    <option value="" ${!value?'selected':''}>— Pendiente</option>
    <option value="Si" ${value==='Si'?'selected':''}>✓ Llegó</option>
    <option value="No" ${value==='No'?'selected':''}>✗ No llegó</option>
  </select>`;
}

function fitSelect(el){
  const span = document.createElement('span');
  span.style.cssText = 'position:absolute;visibility:hidden;font-size:11px;font-weight:600;font-family:inherit;white-space:nowrap;pointer-events:none';
  span.textContent = el.options[el.selectedIndex]?.text || '';
  document.body.appendChild(span);
  el.style.width = (span.offsetWidth + 22) + 'px';
  document.body.removeChild(span);
}

function setArrivedArg(id, value){
  const inv = getInventory();
  const idx = inv.findIndex(i=>i.id===id);
  if(idx<0) return;
  inv[idx].arrived_arg = value;
  saveInventory(inv);
  const cls = value==='Si'?'arrived-si':value==='No'?'arrived-no':'arrived-pending';
  const sel = event.target;
  sel.className = 'arrived-select '+cls;
  fitSelect(sel);
}

function deleteInventory(id){
  confirmDelete(()=>{
    const inv = getInventory().filter(i=>i.id!==id);
    saveInventory(inv);
    const sales = getSales().filter(s=>s.inventory_id!==id);
    saveSales(sales);
    renderInventory();
  });
}

function updateInvTotal(){
  const cost = parseFloat(document.getElementById('f_cost').value)||0;
  const tax = parseFloat(document.getElementById('f_tax').value)||0;
  const el = document.getElementById('f_total');
  if(el) el.value = fUSD(cost+tax);
}

function collectInventoryForm(){
  return {
    description: document.getElementById('f_desc').value.trim(),
    category: document.getElementById('f_cat').value,
    cost_usd: parseFloat(document.getElementById('f_cost').value)||0,
    tax_usd: parseFloat(document.getElementById('f_tax').value)||0,
    purchase_date: document.getElementById('f_date').value,
    status: document.getElementById('f_status').value,
    arrived_arg: document.getElementById('f_arrived').value,
    sale_price_usd: parseFloat(document.getElementById('f_sp_usd').value)||0,

  };

function exportInvCSV(){
  const inv = getInventory();
  const tc = currentTC;
  const headers = ['Código','Descripción','Categoría','Costo USD','Tax+Envío','Total USD','Total ARS','Fecha','Estado','Llegó a ARG','Precio USD','Precio ARS','Margen USD','Margen %','Cobrado','Notas'];
  const rows = inv.map(item=>{
    const c = calcItem(item,tc);
    return [item.id,item.description,item.category,item.cost_usd,item.tax_usd,c.total.toFixed(2),(c.totalARS).toFixed(0),item.purchase_date,item.status,item.arrived_arg||'',c.sp||'',c.spARS||'',c.margin!==null?c.margin.toFixed(2):'',c.marginPct!==null?c.marginPct.toFixed(1)+'%':'',item.collected_by,item.notes].map(v=>`"${v}"`).join(',');
  });
  dlFile('amplify-inventario.csv', [headers.join(','),...rows].join('\n'), 'text/csv');
}

// ─── SALES ────────────────────────────────────────────────────────────────────
function renderSales(){
  const sales = getSales();
  const inv = getInventory();
  const tc = currentTC;

  let filtered = sales.filter(s=>{
    if(salesFilter.channel && s.channel!==salesFilter.channel) return false;
    return true;
  }).sort((a,b)=>b.sale_date.localeCompare(a.sale_date));

  let totalIngresos=0, totalMargen=0;

  const rows = filtered.map(s=>{
    const item = inv.find(i=>i.id===s.inventory_id);
    const costTotal = item ? calcItem(item,tc).total : 0;
    const spUSD = parseFloat(s.sale_price_usd)||0;
    const margin = spUSD - costTotal;
    const marginPct = costTotal>0 ? (margin/costTotal*100) : null;
    const mc = colorMargin(marginPct);
    totalIngresos += spUSD;
    totalMargen += margin;
    return `<tr>
      <td>${s.id}</td>
      <td>${s.inventory_id}</td>
      <td style="max-width:180px;white-space:normal;min-width:140px">${item?item.description:'—'}</td>
      <td>${fUSD(costTotal)}</td>
      <td class="text-bold">${fUSD(spUSD)}</td>
      <td>${s.sale_price_ars>0?fARS(s.sale_price_ars):'—'}</td>
      <td>${s.tc_used||'—'}</td>
      <td class="${mc}">${fUSD(margin)}</td>
      <td class="${mc}">${fPct(marginPct)}</td>
      <td>${fDate(s.sale_date)}</td>
      <td>${s.channel}</td>
      <td>${s.collected_by}</td>
      <td style="max-width:140px;white-space:normal;font-size:12px;color:var(--text-muted)">${s.notes||''}</td>
      <td>
        <div class="actions-cell">
          <button class="btn btn-secondary btn-icon btn-sm" onclick="editSale('${s.id}')">✏️</button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="deleteSale('${s.id}')">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('section-sales').innerHTML = `
    <div class="section-header">
      <h2 class="section-title">Ventas <span style="color:var(--text-muted);font-size:16px;font-weight:400">(${sales.length})</span></h2>
      <button class="btn btn-primary btn-sm" onclick="addSale()">+ Agregar</button>
    </div>
    <div class="filters">
      <select class="filter-select" onchange="salesFilter.channel=this.value;renderSales()">
        <option value="">Todos los canales</option>
        ${['MercadoLibre','Fractal','Directo','Otro'].map(c=>`<option value="${c}" ${salesFilter.channel===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>ID</th><th>Producto</th><th>Descripción</th>
          <th>Costo USD</th><th>Precio USD</th><th>Precio ARS</th><th>TC</th>
          <th>Margen USD</th><th>Margen %</th>
          <th>Fecha</th><th>Canal</th><th>Cobrado</th><th>Notas</th><th></th>
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="14" style="text-align:center;padding:40px;color:var(--text-muted)">Sin ventas</td></tr>'}</tbody>
        ${filtered.length>0?`<tfoot><tr>
          <td colspan="4">Total (${filtered.length} ventas)</td>
          <td>${fUSD(totalIngresos)}</td><td></td><td></td>
          <td class="${totalMargen<0?'text-red':'text-green'}">${fUSD(totalMargen)}</td>
          <td colspan="6"></td>
        </tr></tfoot>`:''}
      </table>
    </div>
  `;
}

function addSale(){
  openPanel('Nueva Venta', buildSaleForm(null), (data)=>{
    const sales = getSales();
    const maxN = sales.reduce((mx,s)=>{ const n=parseInt(s.id.replace('VTA-',''))||0; return Math.max(mx,n); },0);
    data.id = 'VTA-'+(maxN+1).toString().padStart(4,'0');
    sales.push(data);
    saveSales(sales);
    // Update inventory status
    if(data.inventory_id){
      const inv = getInventory();
      const idx = inv.findIndex(i=>i.id===data.inventory_id);
      if(idx>=0){ inv[idx].status='Vendido'; if(data.sale_price_usd) inv[idx].sale_price_usd=data.sale_price_usd; if(data.sale_price_ars) inv[idx].sale_price_ars=data.sale_price_ars; if(data.collected_by) inv[idx].collected_by=data.collected_by; saveInventory(inv); }
    }
    renderSales();
    closePanel();
  });
}

function editSale(id){
  const sales = getSales();
  const s = sales.find(x=>x.id===id);
  if(!s) return;
  openPanel('Editar: '+s.id, buildSaleForm(s), (data)=>{
    const idx = sales.findIndex(x=>x.id===id);
    sales[idx] = {...s,...data,id:s.id};
    saveSales(sales);
    renderSales();
    closePanel();
  });
}

function deleteSale(id){
  confirmDelete(()=>{
    const sales = getSales().filter(s=>s.id!==id);
    saveSales(sales);
    renderSales();
  });
}

function renderExpenses(){
  const exp = getExpenses();
  const tc = currentTC;
  const cats = ['IT','Courier','Productos','Varios'];

  let filtered = exp.filter(e=>{
    if(expFilter.category && e.category!==expFilter.category) return false;
    if(expFilter.paid_by && e.paid_by!==expFilter.paid_by) return false;
    return true;

  const catTotals = {};
  cats.forEach(c=>catTotals[c]=0);
  let totalEquiv=0;
  exp.forEach(e=>{ catTotals[e.category]=(catTotals[e.category]||0)+calcExpEquiv(e,tc); totalEquiv+=calcExpEquiv(e,tc); });

  let filteredTotal=0;
  const rows = filtered.map(e=>{
    const equiv = calcExpEquiv(e,tc);
    filteredTotal += equiv;
    return `<tr>
      <td style="max-width:200px;white-space:normal;min-width:140px">${e.description}</td>

          <button class="btn btn-danger btn-icon btn-sm" onclick="deleteExpense('${e.id}')">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('section-expenses').innerHTML = `

      <h2 class="section-title">Gastos</h2>
      <button class="btn btn-primary btn-sm" onclick="addExpense()">+ Agregar</button>

      </div>`).join('')}
    </div>
    <div class="filters">
      <select class="filter-select" onchange="expFilter.category=this.value;renderExpenses()">
        <option value="">Todas las categorías</option>
        ${cats.map(c=>`<option value="${c}" ${expFilter.category===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="expFilter.paid_by=this.value;renderExpenses()">
        <option value="">Todos los socios</option>
        ${['Frank','Santi','Ambos'].map(p=>`<option value="${p}" ${expFilter.paid_by===p?'selected':''}>${p}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Descripción</th><th>Categoría</th>
          <th>Monto USD</th><th>Monto ARS</th><th>Equiv. USD</th>
          <th>Fecha</th><th>Pagado por</th><th>Notas</th><th></th>
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted)">Sin gastos</td></tr>'}</tbody>
        ${filtered.length>0?`<tfoot><tr>

  s.tc_date = new Date().toISOString();
  saveSettings(s);
  currentTC = val;
  updateTCDisplay();
  renderSettings();
  renderCurrentSection();
}

async function refreshTC(){
  const btn = event.target;
  btn.textContent = 'Actualizando…';
  btn.disabled = true;
  const ok = await fetchTC();
  btn.textContent = ok ? '✓ Actualizado' : '✗ Error';
  setTimeout(()=>{ renderSettings(); },1500);
}

function exportJSON(){
  const data = {
    inventory: getInventory(),
    sales: getSales(),
    expenses: getExpenses(),
    partners: getPartners(),
    senas: getSenas(),
    settings: getSettings(),
    exported_at: new Date().toISOString()
  };
  dlFile('amplify-backup-'+new Date().toISOString().split('T')[0]+'.json', JSON.stringify(data,null,2), 'application/json');
}

function importJSON(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const data = JSON.parse(e.target.result);
      if(!confirm('¿Importar datos? Esto reemplazará todos los registros actuales.')) return;
      if(data.inventory) saveInventory(data.inventory);
      if(data.sales) saveSales(data.sales);
      if(data.expenses) saveExpenses(data.expenses);
      if(data.partners) savePartners(data.partners);
      if(data.senas) saveSenas(data.senas);
      if(data.settings) saveSettings(data.settings);
      updateTCDisplay();
      renderCurrentSection();
      alert('Datos importados correctamente.');
    }catch(err){
      alert('Error al leer el archivo JSON.');
    }
  };
  reader.readAsText(file);
}

function resetAll(){
  if(!confirm('¿Eliminar TODOS los datos? Esta acción es irreversible.')) return;
  if(!confirm('Segunda confirmación: ¿Estás seguro? Se perderán todos los registros.')) return;
  [K.inv,K.sales,K.exp,K.partners,K.settings,K.init,K.senas].forEach(k=>localStorage.removeItem(k));
  initApp();
}

// ─── PANEL ────────────────────────────────────────────────────────────────────
let currentFormSection = null;

function openPanel(title, bodyHTML, callback){
  document.getElementById('panelTitle').textContent = title;
  document.getElementById('panelBody').innerHTML = bodyHTML;
  document.getElementById('panelFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closePanel()">Cancelar</button>
    <button class="btn btn-primary" onclick="submitPanel()">Guardar</button>
  `;
  panelCallback = callback;
  // figure out section from title
  if(title.includes('Producto')) currentFormSection='inventory';
  else if(title.startsWith('Completar seña')) currentFormSection='complete-sena';
  else if(title.includes('Seña') || title.startsWith('SEN-')) currentFormSection='senas';
  else if(title.includes('Venta')) currentFormSection='sales';
  else if(title.includes('Gasto')) currentFormSection='expenses';
  else if(title.includes('Movimiento')) currentFormSection='partners';
  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('slidePanel').classList.add('open');
}

function closePanel(){
  document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('slidePanel').classList.remove('open');
  panelCallback = null;
}

function submitPanel(){
  let data;
  if(currentFormSection==='inventory') data = collectInventoryForm();
  else if(currentFormSection==='sales') data = collectSaleForm();
  else if(currentFormSection==='expenses') data = collectExpenseForm();
  else if(currentFormSection==='partners') data = collectMovementForm();
  else if(currentFormSection==='senas') data = collectSenaForm();
  else if(currentFormSection==='complete-sena') data = collectCompleteSenaForm();
  if(data && panelCallback) panelCallback(data);
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function confirmDelete(callback){
  deleteCallback = callback;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  deleteCallback = null;
}

document.getElementById('modalConfirmBtn').addEventListener('click', ()=>{
  if(deleteCallback) deleteCallback();
  closeModal();
});

document.getElementById('modalOverlay').addEventListener('click', e=>{
  if(e.target === document.getElementById('modalOverlay')) closeModal();
});

function addSena(){
  openPanel('Nueva Seña', buildSenaForm(null), (data)=>{
    const senas = getSenas();
    const maxN = senas.reduce((mx,s)=>{ const n=parseInt(s.id.replace('SEN-',''))||0; return Math.max(mx,n); },0);
    data.id = 'SEN-'+(maxN+1).toString().padStart(4,'0');
    data.status = 'Activa';
    data.sale_ids = [];
    data.completed_date = null;
    // Process products: reserve in-stock items, create En Pedido items
    const inv = getInventory();
    const processedProducts = [];
    (data.products||[]).forEach(p=>{
      if(p.inventory_id && p.inventory_id !== '__new__'){
        const idx = inv.findIndex(i=>i.id===p.inventory_id);
        if(idx>=0 && inv[idx].status==='En Stock'){
          inv[idx].status = 'Reservado';
        }
        processedProducts.push({inventory_id:p.inventory_id, description:p.description, agreed_price_usd:p.agreed_price_usd});
      } else if(p.inventory_id === '__new__' && p.new_description){
        // Create new inventory item as En Pedido
        const maxInv = inv.reduce((mx,i)=>{ const n=parseInt(i.id.replace('AMP-',''))||0; return Math.max(mx,n); },0);
        const newId = 'AMP-'+(maxInv+1).toString().padStart(4,'0');
        inv.push({
          id: newId,
          description: p.new_description,
          category: p.new_category||'Varios',
          cost_usd: parseFloat(p.new_cost)||0,
          tax_usd: 0,
          purchase_date: data.date,
          status: 'En Pedido',
          sale_price_usd: parseFloat(p.agreed_price_usd)||0,
          sale_price_ars: 0,
          collected_by: data.collected_by||'',
          notes: 'Creado desde seña '+data.id,
        });
        processedProducts.push({inventory_id:newId, description:p.new_description, agreed_price_usd:p.agreed_price_usd});
      }
    });
    data.products = processedProducts;
    saveInventory(inv);
    senas.push(data);
    saveSenas(senas);
    renderSenas();
    closePanel();
  });
}

function editSena(id){
  const senas = getSenas();
  const s = senas.find(x=>x.id===id);
  if(!s) return;
  openPanel(s.id+' — Editar', buildSenaForm(s), (data)=>{
    const idx = senas.findIndex(x=>x.id===id);
    senas[idx] = {...s, ...data, id:s.id, status:s.status, sale_ids:s.sale_ids, completed_date:s.completed_date};
    saveSenas(senas);
    renderSenas();
    closePanel();
  });
}

function cancelSena(id){
  if(!confirm('¿Cancelar esta seña? Los productos reservados volverán a "En Stock".')) return;
  const senas = getSenas();
  const s = senas.find(x=>x.id===id);
  if(!s) return;
  // Revert reservado items back to en stock
  const inv = getInventory();
  (s.products||[]).forEach(p=>{
    const idx = inv.findIndex(i=>i.id===p.inventory_id);
    if(idx>=0 && inv[idx].status==='Reservado') inv[idx].status='En Stock';
  });
  saveInventory(inv);
  const idx = senas.findIndex(x=>x.id===id);
  senas[idx].status = 'Cancelada';
  saveSenas(senas);
  renderSenas();
}

function deleteSena(id){
  confirmDelete(()=>{
    saveSenas(getSenas().filter(s=>s.id!==id));
    renderSenas();
  });
}

function completeSena(id){
  const senas = getSenas();
  const s = senas.find(x=>x.id===id);
  if(!s) return;
  openPanel('Completar seña: '+id, buildCompleteSenaPanel(s), (data)=>{
    const inv = getInventory();
    const salesArr = getSales();
    const maxN = salesArr.reduce((mx,x)=>{ const n=parseInt(x.id.replace('VTA-',''))||0; return Math.max(mx,n); },0);
    const newSaleIds = [];
    let counter = maxN;
    (s.products||[]).forEach((p,i)=>{
      counter++;
      const saleId = 'VTA-'+counter.toString().padStart(4,'0');
      salesArr.push({
        id: saleId,
        inventory_id: p.inventory_id,
        sale_price_usd: parseFloat(p.agreed_price_usd)||0,
        sale_price_ars: 0,
        tc_used: parseFloat(data.tc_used)||currentTC,
        sale_date: data.completed_date,
        channel: data.channel,
        collected_by: data.collected_by,
        notes: 'Generado desde seña '+id+(s.notes?' — '+s.notes:''),
      });
      newSaleIds.push(saleId);
      const invIdx = inv.findIndex(x=>x.id===p.inventory_id);
      if(invIdx>=0){ inv[invIdx].status='Vendido'; inv[invIdx].collected_by=data.collected_by; }
    });
    saveInventory(inv);
    saveSales(salesArr);
    const senaIdx = senas.findIndex(x=>x.id===id);
    senas[senaIdx].status = 'Completada';
    senas[senaIdx].completed_date = data.completed_date;
    senas[senaIdx].sale_ids = newSaleIds;
    saveSenas(senas);
    renderSenas();
    closePanel();
    alert(`✓ Seña completada. Se generaron ${newSaleIds.length} venta${newSaleIds.length!==1?'s':''}: ${newSaleIds.join(', ')}`);
  });
}

function onSenaInvChange(i){
  const sel = document.getElementById('p_inv_'+i);

function updateSenaTotals(){
  const lines = document.querySelectorAll('#sena-product-lines .sena-product-line');
  let total = 0;
  lines.forEach(line=>{
    const priceInput = line.querySelector('[id^="p_price_"]');
    if(priceInput) total += parseFloat(priceInput.value)||0;
  });
  const senaInput = document.getElementById('f_sena');
  const sena = senaInput ? parseFloat(senaInput.value)||0 : 0;
  const saldo = total - sena;
  const tEl=document.getElementById('st-total'), sEl=document.getElementById('st-sena'), slEl=document.getElementById('st-saldo');
  if(tEl) tEl.textContent = fUSD(total);
  if(sEl) sEl.textContent = fUSD(sena);
  if(slEl){ slEl.textContent = fUSD(saldo); slEl.className = saldo>0?'text-yellow':'text-green'; }
}

function collectSenaForm(){
  const lines = document.querySelectorAll('#sena-product-lines .sena-product-line');
  const products = [];
  lines.forEach(line=>{
    const invSel = line.querySelector('[id^="p_inv_"]');
    const priceSel = line.querySelector('[id^="p_price_"]');
    if(!invSel||!priceSel) return;
    const invId = invSel.value;
    const price = parseFloat(priceSel.value)||0;
    if(!invId) return;
    if(invId==='__new__'){
      const descEl = line.querySelector('[id^="p_new_desc_"]');
      const catEl = line.querySelector('[id^="p_new_cat_"]');
      const costEl = line.querySelector('[id^="p_new_cost_"]');
      products.push({
        inventory_id:'__new__',
        description: descEl?descEl.value.trim():'',
        new_description: descEl?descEl.value.trim():'',
        new_category: catEl?catEl.value:'',
        new_cost: costEl?parseFloat(costEl.value)||0:0,
        agreed_price_usd: price,

    } else {
      const item = getInventory().find(i=>i.id===invId);
      products.push({inventory_id:invId, description:item?item.description:invId, agreed_price_usd:price});
    }
  });
  return {
    customer_name: document.getElementById('f_cust_name').value.trim(),

    date: document.getElementById('f_date').value,
    collected_by: document.getElementById('f_cob').value,
    products,
    sena_amount_usd: parseFloat(document.getElementById('f_sena').value)||0,
    notes: document.getElementById('f_notes').value.trim(),

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function dlFile(filename, content, type){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = filename;
  a.click();
}

// ─── THEME ────────────────────────────────────────────────────────────────────
function applyTheme(theme){
  const isLight = theme === 'light';
  if(isLight){
    document.documentElement.setAttribute('data-theme','light');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  document.getElementById('themeIcon').textContent = isLight ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = isLight ? 'Modo oscuro' : 'Modo claro';
  document.getElementById('toggleTrack').classList.toggle('on', isLight);
  document.getElementById('toggleThumb').classList.toggle('on', isLight);
  localStorage.setItem('amp_theme', theme);
}

function toggleTheme(){
  const current = localStorage.getItem('amp_theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

function initTheme(){
  applyTheme(localStorage.getItem('amp_theme') || 'dark');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function initApp(){
  initTheme();
  if(!localStorage.getItem(K.init)){
    saveInventory(INIT_INVENTORY);
    saveSales(INIT_SALES);
    saveExpenses(INIT_EXPENSES);
    savePartners(INIT_PARTNERS);
    save(K.init,'1');
    // set a reasonable default TC
    const s = getSettings();
    if(!s.tc){ s.tc=1000; saveSettings(s); }
  }
  // Migrate: add arrived_arg field if missing
  (function(){
    const invData = getInventory();
    let migrated = false;
    invData.forEach(item=>{ if(item.arrived_arg===undefined){ item.arrived_arg=''; migrated=true; } });
    if(migrated) saveInventory(invData);
  })();
  updateTCDisplay();
  renderDashboard();
  // fetch TC in background
  fetchTC(true).then(()=>{ if(currentSection==='dashboard') renderDashboard(); });
}

// Keyboard: close panel with Escape
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closePanel(); closeModal(); } });

initApp();
</script>
</body>
</html>
